<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>duotunnel — Benchmark Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text2:#8b949e;
  --blue:#58a6ff;--green:#3fb950;--orange:#d29922;--red:#f85149;--purple:#bc8cff;
  --blue-dim:rgba(88,166,255,.15);--green-dim:rgba(63,185,80,.15);--orange-dim:rgba(210,153,34,.15);
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;line-height:1.5}
a{color:var(--blue);text-decoration:none}
.container{max-width:1280px;margin:0 auto;padding:24px 16px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
header h1{font-size:20px;font-weight:600}
header h1 span{color:var(--text2);font-weight:400}
.commit-info{font-size:13px;color:var(--text2)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filters button{
  background:var(--surface);border:1px solid var(--border);color:var(--text2);
  padding:4px 12px;border-radius:20px;cursor:pointer;font-size:12px;transition:all .15s;
}
.filters button:hover{border-color:var(--text2)}
.filters button.active{color:var(--text);border-color:var(--blue);background:var(--blue-dim)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.card .label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.card .value{font-size:28px;font-weight:600}
.card .value.err{color:var(--red)}
.card .value.ok{color:var(--green)}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.charts{grid-template-columns:1fr}}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.chart-box.full{grid-column:1/-1}
.chart-box h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text2)}
canvas{width:100%!important}
.empty{text-align:center;padding:80px 20px;color:var(--text2)}
.empty h2{margin-bottom:8px}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>duotunnel <span>bench</span></h1>
    <div class="commit-info" id="commitInfo"></div>
  </header>
  <div id="app"></div>
</div>
<script>
(function(){
  const root = document.getElementById('app');
  const entries = (window.BENCHMARK_DATA && window.BENCHMARK_DATA.entries) || [];
  if (!entries.length) {
    root.innerHTML = '<div class="empty"><h2>No benchmark data yet</h2><p>Push to main to trigger a benchmark run.</p></div>';
    return;
  }

  const latest = entries[entries.length - 1];
  const scenarios = latest.scenarios || [];
  const summary = latest.summary || {};

  const commitEl = document.getElementById('commitInfo');
  const c = latest.commit || {};
  if (typeof c === 'object' && c.id) {
    const short = c.id.substring(0, 7);
    const link = c.url ? `<a href="${c.url}">${short}</a>` : short;
    commitEl.innerHTML = `${link} ${c.message || ''} &middot; ${new Date(latest.timestamp).toLocaleString()}`;
  } else {
    const sha = typeof c === 'string' ? c : '';
    commitEl.textContent = sha.substring(0, 7) + ' \u00b7 ' + new Date(latest.timestamp).toLocaleString();
  }

  const PROTO_COLORS = { HTTP: { bg: 'rgba(88,166,255,.7)', border: '#58a6ff' }, gRPC: { bg: 'rgba(63,185,80,.7)', border: '#3fb950' }, WS: { bg: 'rgba(210,153,34,.7)', border: '#d29922' } };
  const P95_ALPHA = { HTTP: 'rgba(88,166,255,.35)', gRPC: 'rgba(63,185,80,.35)', WS: 'rgba(210,153,34,.35)' };

  let activeProtocols = new Set(['HTTP', 'gRPC', 'WS']);
  let activeDirections = new Set(['ingress', 'egress', 'bidir']);

  function filtered() {
    return scenarios.filter(s => activeProtocols.has(s.protocol) && activeDirections.has(s.direction));
  }

  function buildHTML() {
    const errClass = summary.totalErr > 2 ? 'err' : 'ok';
    return `
      <div class="filters" id="filters">
        <button data-proto="HTTP" class="active">HTTP</button>
        <button data-proto="gRPC" class="active">gRPC</button>
        <button data-proto="WS" class="active">WS</button>
        <span style="width:1px;background:var(--border);margin:0 4px"></span>
        <button data-dir="ingress" class="active">Ingress</button>
        <button data-dir="egress" class="active">Egress</button>
        <button data-dir="bidir" class="active">Bidir</button>
      </div>
      <div class="cards">
        <div class="card"><div class="label">Total RPS</div><div class="value">${summary.totalRPS?.toLocaleString() ?? '—'}</div></div>
        <div class="card"><div class="label">Error Rate</div><div class="value ${errClass}">${summary.totalErr ?? 0}%</div></div>
        <div class="card"><div class="label">Total Requests</div><div class="value">${summary.totalRequests?.toLocaleString() ?? '—'}</div></div>
        <div class="card"><div class="label">Scenarios</div><div class="value">${scenarios.length}</div></div>
      </div>
      <div class="charts">
        <div class="chart-box full"><h3>Latency by Scenario (ms) — p50 + p95</h3><canvas id="latencyChart"></canvas></div>
        <div class="chart-box"><h3>QPS Stress — Latency</h3><canvas id="qpsChart"></canvas></div>
        <div class="chart-box"><h3>QPS Stress — Error Rate</h3><canvas id="qpsErrChart"></canvas></div>
        <div class="chart-box"><h3>Error Rate by Scenario (%)</h3><canvas id="errChart"></canvas></div>
        <div class="chart-box"><h3>Body Size — p95 Latency (ms)</h3><canvas id="bodyChart"></canvas></div>
        <div class="chart-box full"><h3>Trend — Key Metrics over Commits</h3><canvas id="trendChart"></canvas></div>
      </div>
    `;
  }

  const chartDefaults = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
    scales: {
      x: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: 'rgba(48,54,61,.5)' } },
      y: { ticks: { color: '#8b949e' }, grid: { color: 'rgba(48,54,61,.5)' }, beginAtZero: true },
    },
  };

  let charts = [];

  function destroyCharts() {
    charts.forEach(c => c.destroy());
    charts = [];
  }

  function render() {
    destroyCharts();
    root.innerHTML = buildHTML();
    bindFilters();
    renderLatency();
    renderQPS();
    renderQPSErr();
    renderErrors();
    renderBody();
    renderTrend();
  }

  function bindFilters() {
    document.getElementById('filters').addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const proto = btn.dataset.proto;
      const dir = btn.dataset.dir;
      if (proto) {
        if (activeProtocols.has(proto)) activeProtocols.delete(proto); else activeProtocols.add(proto);
        btn.classList.toggle('active');
      }
      if (dir) {
        if (activeDirections.has(dir)) activeDirections.delete(dir); else activeDirections.add(dir);
        btn.classList.toggle('active');
      }
      destroyCharts();
      renderLatency();
      renderQPS();
      renderQPSErr();
      renderErrors();
      renderBody();
    });
  }

  function makeChart(id, config, h) {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    canvas.parentElement.style.height = (h || 300) + 'px';
    canvas.height = h || 300;
    const c = new Chart(canvas, config);
    charts.push(c);
    return c;
  }

  function renderLatency() {
    const f = filtered();
    const labels = f.map(s => s.name.replace(/_/g, ' '));
    const p50Data = f.map(s => s.p50);
    const p95Data = f.map(s => s.p95);
    const p50Colors = f.map(s => PROTO_COLORS[s.protocol]?.bg || 'rgba(255,255,255,.5)');
    const p95Colors = f.map(s => P95_ALPHA[s.protocol] || 'rgba(255,255,255,.2)');

    makeChart('latencyChart', {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'p50', data: p50Data, backgroundColor: p50Colors, borderWidth: 0, borderRadius: 2 },
          { label: 'p95', data: p95Data, backgroundColor: p95Colors, borderWidth: 0, borderRadius: 2 },
        ],
      },
      options: { ...chartDefaults, plugins: { ...chartDefaults.plugins, tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.raw} ms` } } } },
    }, Math.max(250, f.length * 18));
  }

  function renderQPS() {
    const tiers = [1000, 2000, 3000];
    const labels = tiers.map(t => t + ' QPS');
    const inP50 = [], inP95 = [], egP50 = [], egP95 = [];
    for (const qps of tiers) {
      const ing = scenarios.find(s => s.name === `ingress_${qps}qps`);
      const eg = scenarios.find(s => s.name === `egress_${qps}qps`);
      inP50.push(ing ? ing.p50 : null);
      inP95.push(ing ? ing.p95 : null);
      egP50.push(eg ? eg.p50 : null);
      egP95.push(eg ? eg.p95 : null);
    }
    makeChart('qpsChart', {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Ingress p50', data: inP50, backgroundColor: 'rgba(88,166,255,.7)', borderRadius: 2 },
          { label: 'Ingress p95', data: inP95, backgroundColor: 'rgba(88,166,255,.35)', borderRadius: 2 },
          { label: 'Egress p50', data: egP50, backgroundColor: 'rgba(188,140,255,.7)', borderRadius: 2 },
          { label: 'Egress p95', data: egP95, backgroundColor: 'rgba(188,140,255,.35)', borderRadius: 2 },
        ],
      },
      options: { ...chartDefaults, plugins: { ...chartDefaults.plugins, tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.raw} ms` } } } },
    }, 280);
  }

  function renderQPSErr() {
    const tiers = [1000, 2000, 3000];
    const labels = tiers.map(t => t + ' QPS');
    const inErr = [], egErr = [];
    for (const qps of tiers) {
      const ing = scenarios.find(s => s.name === `ingress_${qps}qps`);
      const eg = scenarios.find(s => s.name === `egress_${qps}qps`);
      inErr.push(ing ? ing.err : null);
      egErr.push(eg ? eg.err : null);
    }
    makeChart('qpsErrChart', {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Ingress err%', data: inErr, backgroundColor: 'rgba(248,81,73,.7)', borderRadius: 2 },
          { label: 'Egress err%', data: egErr, backgroundColor: 'rgba(248,81,73,.35)', borderRadius: 2 },
        ],
      },
      options: chartDefaults,
    }, 280);
  }

  function renderErrors() {
    const f = filtered().filter(s => s.err > 0);
    if (!f.length) {
      const canvas = document.getElementById('errChart');
      if (canvas) { canvas.parentElement.style.height = '100px'; canvas.parentElement.querySelector('h3').textContent = 'Error Rate — all zero'; }
      return;
    }
    const labels = f.map(s => s.name.replace(/_/g, ' '));
    const data = f.map(s => s.err);
    makeChart('errChart', {
      type: 'bar',
      data: {
        labels,
        datasets: [{ label: 'Error %', data, backgroundColor: 'rgba(248,81,73,.7)', borderRadius: 2 }],
      },
      options: chartDefaults,
    }, 250);
  }

  function renderBody() {
    const bodySizes = ['ingress_post_1k', 'ingress_post_10k', 'ingress_post_100k', 'egress_post_10k', 'grpc_large_payload'];
    const bodyLabels = { ingress_post_1k: 'HTTP 1K', ingress_post_10k: 'HTTP 10K', ingress_post_100k: 'HTTP 100K', egress_post_10k: 'Egress 10K', grpc_large_payload: 'gRPC 10K' };
    const found = bodySizes.map(n => scenarios.find(s => s.name === n)).filter(Boolean);
    if (!found.length) return;
    const labels = found.map(s => bodyLabels[s.name] || s.name);
    const p95 = found.map(s => s.p95);
    const colors = found.map(s => PROTO_COLORS[s.protocol]?.bg || 'rgba(255,255,255,.5)');
    makeChart('bodyChart', {
      type: 'bar',
      data: { labels, datasets: [{ label: 'p95 ms', data: p95, backgroundColor: colors, borderRadius: 2 }] },
      options: chartDefaults,
    }, 250);
  }

  function renderTrend() {
    if (entries.length < 2) {
      const canvas = document.getElementById('trendChart');
      if (canvas) { canvas.parentElement.style.height = '80px'; canvas.parentElement.querySelector('h3').textContent = 'Trend — need at least 2 data points'; }
      return;
    }
    const labels = entries.map(e => {
      const c = e.commit;
      return typeof c === 'object' ? (c.id || '').substring(0, 7) : (c || '').substring(0, 7);
    });
    const totalRPS = entries.map(e => e.summary?.totalRPS ?? null);
    const totalErr = entries.map(e => e.summary?.totalErr ?? null);

    function avgP95ForCategory(entry, cat) {
      const s = (entry.scenarios || []).filter(sc => sc.category === cat);
      if (!s.length) return null;
      return Math.round(s.reduce((a, sc) => a + sc.p95, 0) / s.length * 100) / 100;
    }
    const basicP95 = entries.map(e => avgP95ForCategory(e, 'basic'));
    const stressP95 = entries.map(e => avgP95ForCategory(e, 'stress'));

    makeChart('trendChart', {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'Total RPS', data: totalRPS, borderColor: '#58a6ff', backgroundColor: 'transparent', yAxisID: 'y', tension: .3, pointRadius: 3 },
          { label: 'Error %', data: totalErr, borderColor: '#f85149', backgroundColor: 'transparent', yAxisID: 'y1', tension: .3, pointRadius: 3 },
          { label: 'Basic avg p95', data: basicP95, borderColor: '#3fb950', backgroundColor: 'transparent', yAxisID: 'y1', tension: .3, pointRadius: 3, borderDash: [4, 2] },
          { label: 'Stress avg p95', data: stressP95, borderColor: '#d29922', backgroundColor: 'transparent', yAxisID: 'y1', tension: .3, pointRadius: 3, borderDash: [4, 2] },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
        scales: {
          x: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: 'rgba(48,54,61,.5)' } },
          y:  { type: 'linear', position: 'left', title: { display: true, text: 'RPS', color: '#8b949e' }, ticks: { color: '#8b949e' }, grid: { color: 'rgba(48,54,61,.5)' }, beginAtZero: true },
          y1: { type: 'linear', position: 'right', title: { display: true, text: 'ms / %', color: '#8b949e' }, ticks: { color: '#8b949e' }, grid: { drawOnChartArea: false }, beginAtZero: true },
        },
      },
    }, 320);
  }

  render();
})();
</script>
</body>
</html>
