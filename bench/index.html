<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>duotunnel — Benchmark Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"></script>
<script src="data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e14;--surface:#111820;--border:#1e2a3a;--border2:#2a3a4d;
  --text:#e0e8f0;--text2:#6b7d93;--text3:#4a5a6d;
  --blue:#4da6ff;--green:#34d399;--orange:#f5a623;--red:#ef5350;--purple:#a78bfa;
  --blue-dim:rgba(77,166,255,.12);
  --panel:340px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--blue);text-decoration:none;cursor:pointer}
a:hover{text-decoration:underline}
.wrap{max-width:1400px;margin:0 auto;padding:32px 24px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
header h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
header h1 span{color:var(--text2);font-weight:400;margin-left:6px}
.meta{font-size:12px;color:var(--text2);font-family:'SF Mono',SFMono-Regular,Consolas,monospace}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
@media(max-width:900px){.cards{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
.card .lb{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:500}
.card .val{font-size:30px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.card .d{font-size:11px;margin-top:6px;font-weight:500}
.d-up{color:var(--green)}.d-down{color:var(--red)}.d-flat{color:var(--text3)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:960px){.row{grid-template-columns:1fr}}
.row.full>*{grid-column:1/-1}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;height:var(--panel);display:flex;flex-direction:column}
.panel.tall{height:400px}
.panel.auto{height:auto}
.panel h3{font-size:12px;font-weight:600;margin-bottom:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.chart-area{flex:1;min-height:0;position:relative}
canvas{position:absolute;inset:0;width:100%!important;height:100%!important}
.sec{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:28px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.tbl-wrap{flex:1;min-height:0;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:6px 10px;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.3px;font-size:10px;position:sticky;top:0;background:var(--surface);z-index:1}
td{padding:6px 10px;border-bottom:1px solid var(--border);font-family:'SF Mono',SFMono-Regular,Consolas,monospace;font-size:11px}
tr:last-child td{border-bottom:none}
.c-good{color:var(--green)}.c-bad{color:var(--red)}.c-dim{color:var(--text3)}
.bar{display:inline-block;height:10px;border-radius:2px;vertical-align:middle;margin-right:6px}
select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:12px;margin-bottom:10px;cursor:pointer;flex-shrink:0}
select:focus{outline:none;border-color:var(--blue)}
.empty{text-align:center;padding:80px 20px;color:var(--text2)}
.empty h2{margin-bottom:8px;font-weight:600}
.pill{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.pill-http{background:rgba(77,166,255,.15);color:var(--blue)}
.pill-grpc{background:rgba(52,211,153,.15);color:var(--green)}
.pill-ws{background:rgba(245,166,35,.15);color:var(--orange)}
.breadcrumb{font-size:12px;color:var(--text2);margin-bottom:20px}
.breadcrumb a{color:var(--blue)}
.row-active{background:rgba(77,166,255,.06)}
tr.clickable{cursor:pointer;transition:background .1s}
tr.clickable:hover{background:rgba(77,166,255,.08)}
.cat-desc{font-size:11px;color:var(--text2);margin-bottom:4px;font-style:italic}
.leg-wrap{display:flex;flex-wrap:wrap;gap:4px 12px;padding:8px 4px 2px;flex-shrink:0}
.leg-item{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;color:var(--text2);padding:2px 6px;border-radius:3px;transition:opacity .15s,background .15s;user-select:none}
.leg-item:hover{background:rgba(77,166,255,.07);color:var(--text)}
.leg-item.leg-active{color:var(--text)}
.leg-swatch{display:inline-block;width:14px;height:10px;border-radius:2px;flex-shrink:0}
.leg-label{white-space:nowrap}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>duotunnel<span>benchmark</span></h1>
    <div class="meta" id="meta"></div>
  </header>
  <div id="app"></div>
</div>
<script>
(function(){

const root = document.getElementById('app');
const metaEl = document.getElementById('meta');
const entries = (window.BENCHMARK_DATA && window.BENCHMARK_DATA.entries) || [];
if (!entries.length) {
  root.innerHTML = '<div class="empty"><h2>No benchmark data yet</h2><p>Push to main to trigger a benchmark run.</p></div>';
  return;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function r2(v) { return Math.round(v * 100) / 100; }
function fmt(v) { return v == null ? '—' : typeof v === 'number' ? v.toLocaleString(undefined, {maximumFractionDigits:1}) : v; }
function sha7(e) { const c = e.commit; return typeof c === 'object' ? (c.id||'').substring(0,7) : (c||'').substring(0,7); }
function shaFull(e) { const c = e.commit; return typeof c === 'object' ? (c.id||'') : (c||''); }
function commitUrl(e) { const c = e.commit; return typeof c === 'object' ? (c.url||'') : ''; }
function commitMsg(e) { const c = e.commit; return typeof c === 'object' ? (c.message||'') : ''; }
function pillFor(proto) { return `<span class="pill pill-${proto.toLowerCase()}">${proto}</span>`; }

function delta(cur, pre, invert) {
  if (pre == null || pre === 0) return '<span class="d d-flat">—</span>';
  const pct = r2((cur - pre) / pre * 100);
  const good = invert ? pct < 0 : pct > 0;
  const cls = Math.abs(pct) < 1 ? 'd-flat' : good ? 'd-up' : 'd-down';
  return `<span class="d ${cls}">${pct > 0 ? '+' : ''}${pct}%</span>`;
}

function deltaVal(cur, pre, invert) {
  if (pre == null) return '—';
  const diff = r2(cur - pre);
  const good = invert ? diff < 0 : diff > 0;
  const cls = Math.abs(diff) < 0.01 ? 'c-dim' : good ? 'c-good' : 'c-bad';
  return `<span class="${cls}">${diff > 0 ? '+' : ''}${diff}</span>`;
}

function latencyBar(val, max, proto) {
  const colors = {HTTP:'var(--blue)',gRPC:'var(--green)',WS:'var(--orange)'};
  const w = max > 0 ? Math.max(2, Math.round(val / max * 80)) : 0;
  return `<span class="bar" style="width:${w}px;background:${colors[proto]||'var(--text3)'}"></span>`;
}

const PHASE_COLORS = [
  'rgba(77,166,255,.08)','rgba(52,211,153,.08)','rgba(245,166,35,.08)',
  'rgba(239,83,80,.08)','rgba(167,139,250,.08)','rgba(244,114,182,.08)',
  'rgba(56,189,248,.08)','rgba(251,191,36,.08)',
  'rgba(132,204,22,.08)','rgba(168,85,247,.08)',
];
// Build phase annotations for a resource chart.
// phases: array of phase objects with start/end already in chart x-axis seconds.
function phaseAnnotations(phases) {
  const a = {};
  phases.forEach((p, i) => {
    const s = p.start || 0;
    const e = p.end || 0;
    const col = PHASE_COLORS[i % PHASE_COLORS.length];
    const nsc = (p.scenarios||[]).length;
    const label = nsc ? `${p.name} (${nsc})` : p.name;
    const yAdj = (i % 2 === 0) ? 10 : 24;
    a['phase'+i] = {
      type: 'box', xMin: s, xMax: e, backgroundColor: col, borderWidth: 0,
      label: {
        display: true, content: label,
        color: 'rgba(180,200,220,0.75)', font: {size: 8, weight: 'bold'},
        position: {x: 'center', y: 'start'}, yAdjust: yAdj,
      },
    };
    a['phaseLine'+i+'s'] = {type:'line',xMin:s,xMax:s,borderColor:'rgba(74,90,109,.3)',borderWidth:1,borderDash:[3,3]};
    a['phaseLine'+i+'e'] = {type:'line',xMin:e,xMax:e,borderColor:'rgba(74,90,109,.3)',borderWidth:1,borderDash:[3,3]};
  });
  return a;
}

const CO = {
  responsive:true, maintainAspectRatio:false,
  plugins:{legend:{display:false}},
  scales:{
    x:{ticks:{color:'#6b7d93',font:{size:9}},grid:{color:'rgba(30,42,58,.5)'}},
    y:{ticks:{color:'#6b7d93'},grid:{color:'rgba(30,42,58,.5)'},beginAtZero:true},
  },
};

let liveCharts = [];
function destroyCharts() { liveCharts.forEach(c => c.destroy()); liveCharts = []; }

// Build legend: click = solo that series (others hidden); click again = restore all
function buildLegend(chart, containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';

  function syncItems() {
    container.querySelectorAll('.leg-item').forEach((el, i) => {
      el.style.opacity = chart.data.datasets[i].hidden ? '0.3' : '1';
    });
    chart.update();
  }

  chart.data.datasets.forEach((ds, i) => {
    const color = ds.borderColor || '#6b7d93';
    const isDash = ds.borderDash && ds.borderDash.length > 0;
    const item = document.createElement('span');
    item.className = 'leg-item';
    item.innerHTML = `<span class="leg-swatch" style="background:${isDash?'transparent':color};border:1.5px ${isDash?'dashed':'solid'} ${color};"></span><span class="leg-label">${ds.label||''}</span>`;
    item.addEventListener('click', () => {
      const isSolo = chart.data.datasets.every((d, j) => j === i ? !d.hidden : d.hidden);
      // if already solo → restore all; else solo this one
      chart.data.datasets.forEach((d, j) => { d.hidden = isSolo ? false : j !== i; });
      syncItems();
    });
    container.appendChild(item);
  });
}

function toAlpha(color, alpha) {
  if (!color) return `rgba(107,125,147,${alpha})`;
  // already rgba
  if (color.startsWith('rgba(')) return color.replace(/,\s*[\d.]+\)$/, `,${alpha})`);
  // rgb(r,g,b)
  if (color.startsWith('rgb(')) return color.replace('rgb(', 'rgba(').replace(')', `,${alpha})`);
  // hex #rrggbb
  if (color.startsWith('#')) {
    const r = parseInt(color.slice(1,3),16);
    const g = parseInt(color.slice(3,5),16);
    const b = parseInt(color.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }
  return color;
}

function mkChart(id, cfg) {
  const cv = document.getElementById(id);
  if (!cv) return;
  const c = new Chart(cv, cfg);
  liveCharts.push(c);
  // Build legend in sibling .leg-wrap element
  const legId = id + '-leg';
  buildLegend(c, legId);
  return c;
}

function findEntry(sha) { return entries.find(e => shaFull(e) === sha || sha7(e) === sha); }
function prevOf(entry) {
  const s = sha7(entry);
  const idx = entries.findIndex(e => sha7(e) === s);
  return idx > 0 ? entries[idx - 1] : null;
}

const DEFAULT_CATEGORY_DEFS = [
  {
    id: 'basic',
    label: 'Basic',
    description: 'Ramping rate with mixed protocols for baseline latency.',
  },
  {
    id: 'body_size',
    label: 'Body Size',
    description: 'Fixed rate with larger payloads to observe payload scaling.',
  },
  {
    id: 'stress',
    label: 'Stress',
    description: 'High-QPS stress stages for ingress and egress under pressure.',
  },
];

// Build a display label for a scenario: prefer s.label, else humanize name.
function scenarioLabel(s) {
  if (s.label) return s.label;
  return s.name.replace(/_/g, ' ');
}

// Format a timeRange as "0–25s" or "35–55s".
function fmtTimeRange(tr) {
  if (!tr) return '—';
  return `${tr.startSec}–${tr.endSec}s`;
}

// Format payloadBytes as "1 KB", "10 KB", "100 KB".
function fmtPayload(bytes) {
  if (!bytes) return null;
  if (bytes >= 1024 * 1024) return `${Math.round(bytes / (1024 * 1024))} MB`;
  if (bytes >= 1024) return `${Math.round(bytes / 1024)} KB`;
  return `${bytes} B`;
}

function normalizeCategoryDefs(defs) {
  if (!Array.isArray(defs)) return [];
  const out = [];
  const seen = new Set();
  for (const d of defs) {
    if (!d || typeof d !== 'object') continue;
    const id = String(d.id || '').trim();
    if (!id || seen.has(id)) continue;
    seen.add(id);
    out.push({
      id,
      label: d.label ? String(d.label) : id,
      description: d.description ? String(d.description) : '',
    });
  }
  return out;
}

function categoryDefsFromEntry(entry) {
  const fromCatalog = normalizeCategoryDefs(entry?.catalog?.categories);
  const defs = fromCatalog.length ? fromCatalog.slice() : DEFAULT_CATEGORY_DEFS.slice();
  const seen = new Set(defs.map((d) => d.id));
  const categories = [...new Set((entry?.scenarios || []).map((s) => s.category).filter(Boolean))];
  for (const id of categories) {
    if (seen.has(id)) continue;
    seen.add(id);
    defs.push({ id, label: id, description: '' });
  }
  return defs;
}

function categoryDefsFromEntries(entryList) {
  const latest = entryList[entryList.length - 1];
  const defs = categoryDefsFromEntry(latest);
  const seen = new Set(defs.map((d) => d.id));
  for (const e of entryList) {
    for (const s of (e.scenarios || [])) {
      const id = s.category;
      if (!id || seen.has(id)) continue;
      seen.add(id);
      defs.push({ id, label: id, description: '' });
    }
  }
  return defs;
}

function categoryMap(defs) {
  const m = {};
  for (const d of defs) m[d.id] = d;
  return m;
}

function trendCanvasId(categoryId) {
  return 'trend_' + String(categoryId).replace(/[^a-zA-Z0-9_]/g, '_');
}

const detailCache = new Map();
async function loadDetail(entry) {
  const s7 = sha7(entry);
  if (detailCache.has(s7)) return detailCache.get(s7);
  try {
    const res = await fetch(`data/${s7}.json`);
    if (!res.ok) return entry;
    const detail = await res.json();
    detailCache.set(s7, detail);
    return detail;
  } catch(_) { return entry; }
}

function navigate() {
  const hash = location.hash.replace('#','');
  destroyCharts();
  if (hash && hash !== 'overview') {
    const entry = findEntry(hash);
    if (entry) {
      root.innerHTML = '<div class="empty" style="padding:60px 0"><p style="color:var(--text2)">Loading…</p></div>';
      const navigatedHash = hash;
      loadDetail(entry).then(full => {
        if (location.hash.replace('#','') !== navigatedHash) return;
        destroyCharts();
        renderDetail(full);
      });
      return;
    }
  }
  renderOverview();
}

function renderOverview() {
  const latest = entries[entries.length - 1];
  const prev = prevOf(latest);
  const sum = latest.summary || {};
  const prevSum = prev ? (prev.summary || {}) : {};
  const categoryDefs = categoryDefsFromEntries(entries);

  metaEl.innerHTML = `Latest: <a href="#${sha7(latest)}">${sha7(latest)}</a> ${esc(commitMsg(latest))} · ${new Date(latest.timestamp).toLocaleString()}`;

  let html = `
  <div class="cards">
    <div class="card"><div class="lb">Total RPS</div><div class="val">${fmt(sum.totalRPS)} <span style="font-size:14px;font-weight:400;color:var(--text2)">req/s</span></div>${delta(sum.totalRPS||0, prevSum.totalRPS, false)}</div>
    <div class="card"><div class="lb">Error Rate</div><div class="val${(sum.totalErr||0)>2?' c-bad':' c-good'}">${sum.totalErr??0}%</div>${delta(sum.totalErr||0, prevSum.totalErr, true)}</div>
    <div class="card"><div class="lb">Total Requests</div><div class="val">${fmt(sum.totalRequests)}</div>${delta(sum.totalRequests||0, prevSum.totalRequests, false)}</div>
    <div class="card"><div class="lb">Scenarios</div><div class="val">${(latest.scenarios||[]).length}</div><span class="d d-flat">${entries.length} runs</span></div>
  </div>

  <div class="sec">Latency Trends (p95 ms)</div>
  ${categoryDefs.map((cat) => `
  <div class="row full">
    <div class="panel tall"><h3>${esc(cat.label)} — p95 latency</h3><div class="chart-area"><canvas id="${trendCanvasId(cat.id)}"></canvas></div><div id="${trendCanvasId(cat.id)}-leg" class="leg-wrap"></div></div>
  </div>`).join('')}

  <div class="sec">All Runs</div>
  <div class="row full">
    <div class="panel auto">
      <h3>Click a row to see details</h3>
      <div class="tbl-wrap" id="histTable"></div>
    </div>
  </div>`;

  root.innerHTML = html;

  (function(){
    const lbl = entries.map(sha7);
    const catScenarios = {};
    for (const cat of categoryDefs) catScenarios[cat.id] = [];
    // Exclude ws_multi_msg from overview charts — its ws_session_duration p95 is
    // orders of magnitude larger than HTTP/gRPC latency and distorts the y-axis.
    const OVERVIEW_EXCLUDE = new Set(['ws_multi_msg']);
    // catScenarios stores {name, tunnel} pairs; use "tunnel:name" as dedup key.
    const seen = {};
    entries.forEach(e => (e.scenarios||[]).forEach(s => {
      const tunnel = s.tunnel || 'duotunnel';
      const key = tunnel + ':' + s.name;
      if (!seen[key] && s.category && catScenarios[s.category] && !OVERVIEW_EXCLUDE.has(s.name)) {
        catScenarios[s.category].push({name: s.name, tunnel});
        seen[key] = true;
      }
    }));
    Object.values(catScenarios).forEach(arr => arr.sort((a, b) => {
      if (a.tunnel !== b.tunnel) return a.tunnel === 'frp' ? 1 : -1;
      return a.name < b.name ? -1 : a.name > b.name ? 1 : 0;
    }));

    const palette = [
      '#4da6ff','#34d399','#f5a623','#ef5350','#a78bfa','#f472b6','#38bdf8','#fbbf24',
      '#818cf8','#fb923c','#22d3ee','#a3e635','#e879f9','#94a3b8',
    ];
    const dashes = [[], [6,3], [2,2], [8,4,2,4], [4,4]];

    function renderCatChart(canvasId, entries_list) {
      if (!entries_list.length || entries.length < 2) {
        const el = document.getElementById(canvasId);
        if (el) el.closest('.panel').querySelector('h3').textContent += ' — need ≥ 2 runs';
        return;
      }
      const ds = entries_list.map(({name, tunnel}, i) => {
        const isFrp = tunnel === 'frp';
        const label = name.replace(/_/g, ' ');
        return {
          label,
          data: entries.map(e => { const s = (e.scenarios||[]).find(x => x.name === name && (x.tunnel||'duotunnel') === tunnel); return s ? s.p95 : null; }),
          borderColor: palette[i % palette.length],
          backgroundColor: 'transparent',
          borderDash: isFrp ? [4,3] : dashes[Math.floor(i / palette.length) % dashes.length],
          tension: .3,
          pointRadius: 2,
          borderWidth: 1.5,
          spanGaps: true,
        };
      });
      mkChart(canvasId, {type:'line', data:{labels:lbl, datasets:ds}, options:{
        ...CO,
        onClick(evt, elems) { if (elems.length) location.hash = lbl[elems[0].index]; },
        plugins:{...CO.plugins, tooltip:{mode:'index',intersect:false,callbacks:{label:ctx=>ctx.raw!=null?`${ctx.dataset.label}: ${ctx.raw} ms`:''}}},
        scales:{x:CO.scales.x, y:{...CO.scales.y, title:{display:true,text:'ms',color:'#6b7d93'}}},
      }});
    }

    for (const cat of categoryDefs) {
      renderCatChart(trendCanvasId(cat.id), catScenarios[cat.id] || []);
    }
  })();

  (function(){
    const el = document.getElementById('histTable');
    if (!el) return;
    let h = '<table><thead><tr><th>Commit</th><th>Date</th><th>RPS (req/s)</th><th>Δ</th><th>Err %</th><th>Δ</th><th>Reqs</th><th>Scenarios</th></tr></thead><tbody>';
    for (let i = entries.length - 1; i >= 0; i--) {
      const e = entries[i];
      const p = i > 0 ? entries[i-1] : null;
      const s7 = sha7(e);
      const rps = e.summary?.totalRPS??0;
      const err = e.summary?.totalErr??0;
      const reqs = e.summary?.totalRequests??0;
      const nsc = (e.scenarios||[]).length;
      let dR='—', dE='—';
      if (p) {
        const pR = p.summary?.totalRPS??0;
        const pE = p.summary?.totalErr??0;
        if (pR>0) { const d=r2(rps-pR); dR=`<span class="${d>0?'c-good':d<0?'c-bad':'c-dim'}">${d>0?'+':''}${d}</span>`; }
        const dEv=r2(err-pE); dE=`<span class="${dEv<0?'c-good':dEv>0?'c-bad':'c-dim'}">${dEv>0?'+':''}${dEv}%</span>`;
      }
      const active = i === entries.length - 1 ? ' row-active' : '';
      h += `<tr class="clickable${active}" data-sha="${s7}"><td>${s7}</td><td style="color:var(--text2)">${new Date(e.timestamp).toLocaleString(undefined, {year:'numeric',month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})}</td><td>${fmt(rps)}</td><td>${dR}</td><td>${err}%</td><td>${dE}</td><td>${fmt(reqs)}</td><td>${nsc}</td></tr>`;
    }
    h += '</tbody></table>';
    el.innerHTML = h;
    el.addEventListener('click', e => { const tr = e.target.closest('tr.clickable'); if (tr) location.hash = tr.dataset.sha; });
  })();
}

function renderDetail(entry) {
  const prev = prevOf(entry);
  const sc = entry.scenarios || [];
  const sum = entry.summary || {};
  const prevSum = prev ? (prev.summary || {}) : {};
  const traceArtifactUrl = entry.artifacts && entry.artifacts.trace_artifact_url ? entry.artifacts.trace_artifact_url : '';
  const traceServer = entry.artifacts && entry.artifacts.trace_server ? entry.artifacts.trace_server : '';
  const traceClient = entry.artifacts && entry.artifacts.trace_client ? entry.artifacts.trace_client : '';
  const traceCases = (entry.artifacts && Array.isArray(entry.artifacts.trace_cases)) ? entry.artifacts.trace_cases : [];
  const runUrl = entry.run_url || '';
  const s7 = sha7(entry);
  const url = commitUrl(entry);
  const categoryDefs = categoryDefsFromEntry(entry);
  const categoryDefById = categoryMap(categoryDefs);

  const ghLink = url ? `<a href="${url}" target="_blank">${s7}</a>` : s7;
  const runLink = runUrl ? ` <a href="${esc(runUrl)}" target="_blank" style="font-size:11px;color:var(--text2)">[CI run]</a>` : '';
  metaEl.innerHTML = `${ghLink}${runLink} ${esc(commitMsg(entry))} · ${new Date(entry.timestamp).toLocaleString()}`;

  const prevScMap = {};
  if (prev) (prev.scenarios||[]).forEach(s => { prevScMap[(s.tunnel||'duotunnel')+':'+s.name] = s; });
  const maxP95 = Math.max(...sc.map(s => s.p95 || 0), 1);

  let html = `
  <div class="breadcrumb"><a onclick="location.hash='overview';return false;" href="#overview">← All Runs</a> / ${s7}</div>
  <div class="cards">
    <div class="card"><div class="lb">Total RPS</div><div class="val">${fmt(sum.totalRPS)} <span style="font-size:14px;font-weight:400;color:var(--text2)">req/s</span></div>${delta(sum.totalRPS||0, prevSum.totalRPS, false)}</div>
    <div class="card"><div class="lb">Error Rate</div><div class="val${(sum.totalErr||0)>2?' c-bad':' c-good'}">${sum.totalErr??0}%</div>${delta(sum.totalErr||0, prevSum.totalErr, true)}</div>
    <div class="card"><div class="lb">Total Requests</div><div class="val">${fmt(sum.totalRequests)}</div>${delta(sum.totalRequests||0, prevSum.totalRequests, false)}</div>
    <div class="card"><div class="lb">Scenarios</div><div class="val">${sc.length}</div><span class="d d-flat">${prev ? 'vs ' + sha7(prev) : 'first run'}</span></div>
  </div>

  ${(traceServer || traceClient || traceCases.length || traceArtifactUrl || runUrl) ? `
  <div class="row full">
    <div class="panel auto">
      <h3>Dial9 Traces (8k scenario)</h3>
      <div style="font-size:13px;display:flex;gap:16px;flex-wrap:wrap">
        ${traceServer ? `<a href="${esc(traceServer)}" target="_blank">Server trace (dial9 viewer)</a>` : ''}
        ${traceClient ? `<a href="${esc(traceClient)}" target="_blank">Client trace (dial9 viewer)</a>` : ''}
        ${traceCases.map(tc => {
          const links = [];
          if (tc.server) links.push(`<a href="viewer/?trace=${encodeURIComponent(tc.server)}" target="_blank">server</a>`);
          if (tc.client) links.push(`<a href="viewer/?trace=${encodeURIComponent(tc.client)}" target="_blank">client</a>`);
          if (tc.server_download) links.push(`<a href="${esc(tc.server_download)}" target="_blank" style="color:var(--text2)">server_download</a>`);
          if (tc.client_download) links.push(`<a href="${esc(tc.client_download)}" target="_blank" style="color:var(--text2)">client_download</a>`);
          return `<span style="white-space:nowrap">${esc(tc.case)}: ${links.join(' / ')}</span>`;
        }).join('')}
        ${traceArtifactUrl ? `<a href="${esc(traceArtifactUrl)}" target="_blank" style="color:var(--text2)">Download .bin.gz ↗</a>` : ''}
        ${runUrl ? `<a href="${esc(runUrl)}/artifacts" target="_blank" style="color:var(--text2)">All artifacts ↗</a>` : ''}
      </div>
    </div>
  </div>` : ''}

  <div class="sec">Scenario Results</div>
  <div class="row full">
    <div class="panel auto">
      <h3>All Scenarios — ${s7}</h3>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Scenario</th><th>Proto</th><th>Dir</th><th>Time</th><th>Target</th><th>Threshold</th><th>p50 (ms)</th><th>p95 (ms)</th><th>Latency</th><th>RPS (req/s)</th><th>Reqs</th><th>Err %</th>${prev ? '<th>Δ p50 (ms)</th><th>Δ p95 (ms)</th><th>Δ RPS</th>' : ''}</tr></thead>
          <tbody>`;

  const colSpan = prev ? 16 : 12;
  for (const catDef of categoryDefs) {
    const cat = catDef.id;
    const group = sc.filter(s => s.category === cat);
    if (!group.length) continue;
    // duotunnel rows first, frp rows after — preserves logical ordering
    group.sort((a, b) => {
      const ta = a.tunnel || 'duotunnel';
      const tb = b.tunnel || 'duotunnel';
      if (ta !== tb) return ta === 'frp' ? 1 : -1;
      return 0;
    });
    html += `<tr><td colspan="${colSpan}" style="padding:12px 10px 2px;border-bottom:none">
      <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">${categoryDefById[cat]?.label || cat}</div>
      <div class="cat-desc">${categoryDefById[cat]?.description || ''}</div>
    </td></tr>`;
    // Group by phase within category
    const phaseOrder = [];
    const byPhase = {};
    for (const s of group) {
      const ph = s.phase || '—';
      if (!byPhase[ph]) { byPhase[ph] = []; phaseOrder.push(ph); }
      byPhase[ph].push(s);
    }
    for (const ph of phaseOrder) {
      if (phaseOrder.length > 1) {
        html += `<tr><td colspan="${colSpan}" style="padding:4px 10px 2px;border-bottom:none">
          <span style="font-size:9px;font-weight:600;color:var(--blue);opacity:.7;text-transform:uppercase;letter-spacing:.4px">phase: ${esc(ph)}</span>
        </td></tr>`;
      }
      for (const s of byPhase[ph]) {
        const errCls = s.err > 0 ? 'c-bad' : 'c-dim';
        const isFrp = s.tunnel === 'frp';
        const ps = prevScMap[(s.tunnel||'duotunnel')+':'+s.name];
        const tunnelTag = isFrp ? ` <span style="font-size:9px;font-weight:600;color:var(--orange);background:rgba(245,166,35,.15);padding:1px 5px;border-radius:3px">frp</span>` : '';
        const payloadTag = s.payloadBytes ? ` <span style="font-size:9px;color:var(--text2)">${fmtPayload(s.payloadBytes)}</span>` : '';
        html += `<tr>
          <td style="color:var(--text)">${scenarioLabel(s)}${tunnelTag}${payloadTag}</td>
          <td>${pillFor(s.protocol)}</td>
          <td style="color:var(--text2)">${s.direction}</td>
          <td style="color:var(--text2);font-size:10px">${fmtTimeRange(s.timeRange)}</td>
          <td style="color:var(--text2);font-size:10px">${s.targetRate ? fmt(s.targetRate) + ' rps' : '—'}</td>
          <td style="color:var(--text3);font-size:10px">${s.thresholdSpec ? esc(s.thresholdSpec) : '—'}</td>
          <td>${s.p50} <span class="c-dim">ms</span></td>
          <td>${s.p95} <span class="c-dim">ms</span></td>
          <td>${latencyBar(s.p95, maxP95, s.protocol)}${s.p95} <span class="c-dim">ms</span></td>
          <td>${s.rps > 0 ? fmt(s.rps) : '<span class="c-dim">0</span>'}</td>
          <td>${s.requests > 0 ? fmt(s.requests) : '<span class="c-dim">0</span>'}</td>
          <td class="${errCls}">${s.err > 0 ? s.err + '%' : '0'}</td>`;
        if (prev) {
          html += `<td>${ps ? deltaVal(s.p50, ps.p50, true) : '—'}</td>`;
          html += `<td>${ps ? deltaVal(s.p95, ps.p95, true) : '—'}</td>`;
          html += `<td>${ps ? deltaVal(s.rps, ps.rps, false) : '—'}</td>`;
        }
        html += `</tr>`;
      }
    }
  }
  html += `</tbody></table></div></div></div>`;

  {
    function row1(panel) {
      if (!panel) return '';
      const {id, title} = panel;
      return `<div class="row full"><div class="panel"><h3>${title}</h3><div class="chart-area"><canvas id="${id}"></canvas></div><div id="${id}-leg" class="leg-wrap"></div></div></div>`;
    }

    // Merge core resources (entry.resources) into rpcEntries as "core" key
    const rpc = Object.assign({}, entry.resources_per_case || {});
    if (entry.resources && !rpc['core']) rpc['core'] = entry.resources;
    const rpcKeys = Object.keys(rpc);
    if (rpcKeys.length) {
      const anyCtxsw   = rpcKeys.some(k => Object.values(rpc[k].processes||{}).some(p => p.cswch?.length));
      const anyTCP     = rpcKeys.some(k => rpc[k].tcp_conns && (rpc[k].tcp_conns.estab?.length || rpc[k].tcp_conns.timewait?.length));
      // Prefer machine info from core if available, else first case
      const machineSource = rpc['core'] || rpc[rpcKeys[0]] || {};
      const fSys       = machineSource.system || {};
      const machineSpec = (() => {
        const m = machineSource.machine;
        if (!m) return '';
        const ram = m.mem_total_mb >= 1024 ? `${Math.round(m.mem_total_mb/1024)} GB` : `${m.mem_total_mb} MB`;
        return ` <span style="color:var(--text2);font-weight:400;font-size:11px">· ${m.cpu_cores} vCPU · ${ram} RAM</span>`;
      })();
      const hasTopCPU    = rpcKeys.some(k => rpc[k].top_cpu && Object.keys(rpc[k].top_cpu).length > 0);
      const hasTopRSS    = rpcKeys.some(k => rpc[k].top_rss && Object.keys(rpc[k].top_rss).length > 0);
      const hasPerCore   = rpcKeys.some(k => Array.isArray(rpc[k].system?.cpu_per_core) && rpc[k].system.cpu_per_core.length > 0);
      const hasLoad      = rpcKeys.some(k => rpc[k].system?.loadavg_1?.length > 0);
      const hasNet       = rpcKeys.some(k => rpc[k].system?.net_rx_kbs?.length > 0 || rpc[k].system?.net_tx_kbs?.length > 0);
      const hasNetPkts   = rpcKeys.some(k => rpc[k].system?.net_rx_pkts?.length > 0);
      const hasDisk      = rpcKeys.some(k => rpc[k].system?.disk_read_kbs?.length > 0 || rpc[k].system?.disk_write_kbs?.length > 0);
      const hasIntr      = rpcKeys.some(k => rpc[k].system?.interrupts?.length > 0);
      const hasSysTcp    = rpcKeys.some(k => rpc[k].system?.tcp_estab?.length > 0);
      const hasUdp       = rpcKeys.some(k => rpc[k].system?.udp_rx_err?.length > 0);
      const hasVms       = rpcKeys.some(k => Object.values(rpc[k].processes||{}).some(p => p.vms?.length));
      html += `<div class="sec">Resources${machineSpec}</div>`;
      html += row1({id:'cpu8k',    title:'CPU Usage (% of machine)'});
      if (hasPerCore) html += row1({id:'perCore8k', title:'Per-core CPU (%)'});
      html += row1({id:'mem8k',    title:'Memory RSS (MB)'});
      if (hasLoad)     html += row1({id:'load8k',   title:'Load Avg + Swap (MB)'});
      if (hasNet)      html += row1({id:'netKbs8k',  title:'Network Throughput (KB/s)'});
      if (hasNetPkts)  html += row1({id:'netPkts8k', title:'Network Packets/s + Drops'});
      if (anyCtxsw)    html += row1({id:'ctxsw8k',   title:'Context Switches / s'});
      if (anyTCP || hasSysTcp) html += row1({id:'tcp8k', title:'TCP Connections'});
      if (hasVms)      html += row1({id:'vms8k',     title:'Virtual Memory Size (MB)'});
      if (hasDisk)     html += row1({id:'disk8k',    title:'Disk I/O (KB/s)'});
      if (hasIntr)     html += row1({id:'intr8k',    title:'Interrupts / s'});
      if (hasUdp)      html += row1({id:'udp8k',     title:'UDP Errors / s'});
      if (hasTopCPU)   html += row1({id:'top8kCpuChart', title:'Top 10 CPU (% of machine)'});
      if (hasTopRSS)   html += row1({id:'top8kRssChart', title:'Top 10 RSS (MB)'});
    }
  }

  const idx = entries.findIndex(e => sha7(e) === sha7(entry));
  const prevEntry = idx > 0 ? entries[idx - 1] : null;
  const nextEntry = idx < entries.length - 1 ? entries[idx + 1] : null;
  html += `<div style="display:flex;justify-content:space-between;margin-top:24px">`;
  html += prevEntry ? `<a onclick="location.hash='${sha7(prevEntry)}';return false;" href="#${sha7(prevEntry)}">← ${sha7(prevEntry)}</a>` : `<span class="c-dim">oldest</span>`;
  html += nextEntry ? `<a onclick="location.hash='${sha7(nextEntry)}';return false;" href="#${sha7(nextEntry)}">${sha7(nextEntry)} →</a>` : `<span class="c-dim">latest</span>`;
  html += `</div>`;

  root.innerHTML = html;

  // ── All-cases resource charts (merged onto one x-axis) ──────────────────
  {
    const PSERIES = [
      {key:'server',    label:'Server',    color:'#4da6ff'},
      {key:'client',    label:'Client',    color:'#34d399'},
      {key:'http_echo', label:'HTTP Echo', color:'#a78bfa'},
      {key:'ws_echo',   label:'WS Echo',   color:'#f472b6'},
      {key:'grpc_echo', label:'gRPC Echo', color:'#fb923c'},
      {key:'k6',        label:'k6',        color:'#f5a623'},
      {key:'frps',      label:'frps',      color:'#22d3ee'},
      {key:'frpc',      label:'frpc',      color:'#a3e635'},
      {key:'other',     label:'Other',     color:'#4a5a6d'},
    ];
    const CPU_BREAKDOWN = [
      {key:'cpu_usr',    label:'usr',           color:'#4da6ff'},
      {key:'cpu_sys',    label:'sys',           color:'#34d399'},
      {key:'cpu_soft',   label:'soft (net irq)',color:'#ef5350'},
      {key:'cpu_irq',    label:'irq',           color:'#f5a623'},
      {key:'cpu_iowait', label:'iowait',        color:'#a78bfa'},
      {key:'cpu_steal',  label:'steal',         color:'#4a5a6d'},
    ];
    const TOP_PALETTE = [
      '#4da6ff','#34d399','#f5a623','#ef5350','#a78bfa',
      '#f472b6','#38bdf8','#fbbf24','#818cf8','#fb923c',
    ];
    // Build rpcEntries: core first (from entry.resources), then per-case
    const rpcEntries = [];
    if (entry.resources) rpcEntries.push(['core', entry.resources]);
    for (const [k, v] of Object.entries(entry.resources_per_case || {})) rpcEntries.push([k, v]);
    if (rpcEntries.length) {
      // Compute per-case time offsets so all cases are serialised on one x-axis.
      // Offset for case[i] = sum of maxT of cases[0..i-1], with a small gap.
      const CASE_GAP = 5; // seconds between cases
      const caseOffsets = [];
      let runningOffset = 0;
      const caseMaxTs = rpcEntries.map(([, caseRes]) => {
        const pr = caseRes.processes || {};
        const pts = [...(caseRes.system?.cpu||[]), ...Object.values(pr).flatMap(p=>[...(p.cpu||[]),...(p.rss||[])])];
        return pts.length ? Math.max(...pts.map(p=>p[0]??0)) : 0;
      });
      for (let i = 0; i < rpcEntries.length; i++) {
        caseOffsets.push(runningOffset);
        runningOffset += caseMaxTs[i] + CASE_GAP;
      }
      const totalXMax = runningOffset - CASE_GAP + 5;

      // Build merged phase annotations.
      // Because core and 8k are parallel CI jobs with independent clocks, their
      // resource time axes are independent — there is no shared wall-clock origin.
      // We annotate at phase granularity (not per-scenario) to avoid visual clutter.
      //
      // core: use entry.phases (which have absolute k6-relative start/end seconds),
      //       shift by k6OffsetSeconds so they align with the resource sampling axis,
      //       then shift by caseOffsets[idx] for the merged chart x-axis.
      //
      // 8k cases: each case runs its own k6 + tunnel with sampling starting at t=0.
      //           The entire case occupies [0, caseMaxTs[idx]] on its own axis.
      //           We label it with the case name at the centre of that range.
      const mergedPhases = [];
      rpcEntries.forEach(([caseName, caseRes], idx) => {
        const chartOff = caseOffsets[idx];
        if (caseName === 'core') {
          const k6off = caseRes.k6OffsetSeconds || 0;
          const corePhaseDefs = (entry.phases || []).filter(p => !p.case && !p.tunnel);
          for (const p of corePhaseDefs) {
            mergedPhases.push({
              name: p.name,
              scenarios: p.scenarios || [],
              start: (p.start || 0) + k6off + chartOff,
              end:   (p.end   || 0) + k6off + chartOff,
            });
          }
        } else {
          // 8k case: single scenario spanning the full sampling window.
          const shortName = caseName.replace(/ \(.*?\)$/, '').replace(/_8000qps$/, ' 8k').replace(/_multihost/, ' mh').replace(/_/g, ' ');
          mergedPhases.push({
            name: shortName,
            scenarios: [caseName],
            start: chartOff,
            end:   chartOff + caseMaxTs[idx],
          });
        }
      });
      // Case background bands + name labels
      const CASE_BG_COLORS = [
        'rgba(77,166,255,.06)',  'rgba(52,211,153,.06)',
        'rgba(245,166,35,.06)',  'rgba(167,139,250,.06)',
        'rgba(244,114,182,.06)', 'rgba(56,189,248,.06)',
        'rgba(251,191,36,.06)',  'rgba(129,140,248,.06)',
        'rgba(251,146,60,.06)',  'rgba(34,211,238,.06)',
        'rgba(163,230,53,.06)',  'rgba(232,121,249,.06)',
        'rgba(148,163,184,.06)',
      ];
      const boundaryAnnotations = {};
      rpcEntries.forEach(([caseName,], idx) => {
        const xStart = caseOffsets[idx];
        const xEnd   = xStart + caseMaxTs[idx];
        if (caseName !== 'core') {
          const bgColor = CASE_BG_COLORS[idx % CASE_BG_COLORS.length];
          boundaryAnnotations[`caseBg${idx}`] = {
            type: 'box',
            xMin: xStart, xMax: xEnd,
            backgroundColor: bgColor,
            borderWidth: 0,
            label: { display: false },
          };
        }
        if (idx > 0) {
          boundaryAnnotations[`caseSep${idx}`] = {
            type:'line', xMin:xStart, xMax:xStart,
            borderColor:'rgba(255,255,255,0.2)', borderWidth:1.5, borderDash:[5,3],
          };
        }
      });

      // Overlay bands for phases that belong to a specific resource case
      // (e.g. frp phases overlaid on the core resource axis).
      // start/end are already on the resource-sampling axis (set by publish-bench.py).
      const caseOffsetMap = Object.fromEntries(rpcEntries.map(([n,], i) => [n, caseOffsets[i]]));
      (entry.phases || []).filter(p => p.resourceCase).forEach((p, fi) => {
        const chartOff = caseOffsetMap[p.resourceCase] ?? 0;
        const shortName = p.name.replace(/ \([^)]*\)$/i, '').trim();
        boundaryAnnotations[`overlayBand${fi}`] = {
          type: 'box',
          xMin: (p.start || 0) + chartOff,
          xMax: (p.end   || 0) + chartOff,
          backgroundColor: 'rgba(245,166,35,.08)',
          borderWidth: 1,
          borderColor: 'rgba(245,166,35,.25)',
          label: {
            display: true,
            content: shortName,
            color: 'rgba(245,166,35,0.75)',
            font: {size: 11, weight: 'bold'},
            position: {x: 'center', y: 'end'},
            yAdjust: -4,
          },
        };
      });
      const allAnnotations = {...phaseAnnotations(mergedPhases), ...boundaryAnnotations};

      function shiftPts(pts, offset) { return pts.map(p=>({x:(p[0]??0)+offset, y:p[1]})); }

      const cTSO = {
        ...CO, showLine:true,
        plugins:{...CO.plugins, annotation:{annotations:allAnnotations}, tooltip:{mode:'index',intersect:false}},
        scales:{
          x:{...CO.scales.x, type:'linear', title:{display:true,text:'seconds',color:'#6b7d93'}, max:totalXMax},
          y:{...CO.scales.y},
        },
      };
      function cYTitle(text){return{scales:{...cTSO.scales,y:{...cTSO.scales.y,title:{display:true,text,color:'#6b7d93'}}}};}
      function cLinePts(pts,color,label,extra={}){return{label,data:pts,borderColor:color,backgroundColor:'transparent',tension:.3,pointRadius:0,borderWidth:1.5,...extra};}

      // Merge datasets: one series per process key, concatenated across all cases.
      // Use null gap between cases to avoid connecting lines.
      const cpuByKey = {};   // key -> [{x,y}]
      const memByKey = {};
      const vmsByKey = {};
      const csVolByKey = {};
      const csInvolByKey = {};
      const tcpEstab = [], tcpTimewait = [], tcpClosed = [];
      const sysTcpEstab = [], sysTcpTimewait = [];
      const diskRdKbs = [], diskWrKbs = [], diskRdIops = [], diskWrIops = [];
      const intrPts = [], ctxSwPts = [];
      const udpRxErr = [], udpBufErr = [];
      let hasCpu = false, hasMem = false, hasVms8k = false, hasCs = false;
      let hasTcpMerged = false, hasSysTcp8k = false;
      let hasDisk8k = false, hasIntr8k = false, hasUdp8k = false;
      // System total and CPU breakdown (merge across cases)
      const sysCpuMerged = [];
      const sysBdMerged = {}; // breakdown key -> [{x,y}]

      rpcEntries.forEach(([, caseRes], idx) => {
        const off = caseOffsets[idx];
        const maxT = caseMaxTs[idx];
        const cProc = caseRes.processes || {};
        const cSys  = caseRes.system || {};

        // null gap marker
        const gap = [{x: off + maxT + 0.01, y: null}];

        for (const s of PSERIES) {
          const p = cProc[s.key];
          if (!cpuByKey[s.key]) cpuByKey[s.key] = [];
          if (!memByKey[s.key]) memByKey[s.key] = [];
          if (!vmsByKey[s.key]) vmsByKey[s.key] = [];
          if (!csVolByKey[s.key]) csVolByKey[s.key] = [];
          if (!csInvolByKey[s.key]) csInvolByKey[s.key] = [];

          if (p?.cpu?.length) {
            cpuByKey[s.key].push(...shiftPts(p.cpu, off), ...gap);
            hasCpu = true;
          }
          if (p?.rss?.length) {
            memByKey[s.key].push(...shiftPts(p.rss, off), ...gap);
            hasMem = true;
          }
          if (p?.vms?.length) {
            vmsByKey[s.key].push(...shiftPts(p.vms, off), ...gap);
            hasVms8k = true;
          }
          if (p?.cswch?.length)   { csVolByKey[s.key].push(...shiftPts(p.cswch, off), ...gap); hasCs = true; }
          if (p?.nvcswch?.length) { csInvolByKey[s.key].push(...shiftPts(p.nvcswch, off), ...gap); hasCs = true; }
        }

        if (cSys.cpu?.length)
          sysCpuMerged.push(...shiftPts(cSys.cpu, off), ...gap);

        for (const bd of CPU_BREAKDOWN) {
          const pts = cSys[bd.key];
          if (pts?.length) {
            if (!sysBdMerged[bd.key]) sysBdMerged[bd.key] = [];
            sysBdMerged[bd.key].push(...shiftPts(pts, off), ...gap);
          }
        }

        const tc = caseRes.tcp_conns;
        if (tc) {
          if (tc.estab?.length)    { tcpEstab.push(...shiftPts(tc.estab, off), ...gap); hasTcpMerged = true; }
          if (tc.timewait?.length) { tcpTimewait.push(...shiftPts(tc.timewait, off), ...gap); hasTcpMerged = true; }
          if (tc.closed?.length)   { tcpClosed.push(...shiftPts(tc.closed, off), ...gap); hasTcpMerged = true; }
        }
        if (cSys.tcp_estab?.length)    { sysTcpEstab.push(...shiftPts(cSys.tcp_estab, off), ...gap); hasSysTcp8k = true; }
        if (cSys.tcp_timewait?.length) { sysTcpTimewait.push(...shiftPts(cSys.tcp_timewait, off), ...gap); hasSysTcp8k = true; }

        if (cSys.disk_read_kbs?.length)  { diskRdKbs.push(...shiftPts(cSys.disk_read_kbs, off), ...gap); hasDisk8k = true; }
        if (cSys.disk_write_kbs?.length) { diskWrKbs.push(...shiftPts(cSys.disk_write_kbs, off), ...gap); hasDisk8k = true; }
        if (cSys.disk_read_iops?.length)  diskRdIops.push(...shiftPts(cSys.disk_read_iops, off), ...gap);
        if (cSys.disk_write_iops?.length) diskWrIops.push(...shiftPts(cSys.disk_write_iops, off), ...gap);

        if (cSys.interrupts?.length)   { intrPts.push(...shiftPts(cSys.interrupts, off), ...gap); hasIntr8k = true; }
        if (cSys.ctx_switches?.length) ctxSwPts.push(...shiftPts(cSys.ctx_switches, off), ...gap);

        if (cSys.udp_rx_err?.length)  { udpRxErr.push(...shiftPts(cSys.udp_rx_err, off), ...gap); hasUdp8k = true; }
        if (cSys.udp_buf_err?.length) udpBufErr.push(...shiftPts(cSys.udp_buf_err, off), ...gap);
      });

      // CPU chart
      if (hasCpu) {
        const cCpuDS = [];
        for (const s of PSERIES) {
          if (!cpuByKey[s.key]?.length) continue;
          cCpuDS.push({label:s.label, data:cpuByKey[s.key], borderColor:s.color, backgroundColor:s.color+'28',
            fill:true, tension:.3, pointRadius:0, borderWidth:1.5});
        }
        for (const bd of CPU_BREAKDOWN) {
          if (sysBdMerged[bd.key]?.length)
            cCpuDS.push({label:bd.label, data:sysBdMerged[bd.key], borderColor:bd.color, backgroundColor:'transparent',
              fill:false, tension:.3, pointRadius:0, borderWidth:1, borderDash:[3,2], hidden:true});
        }
        if (sysCpuMerged.length)
          cCpuDS.push({label:'System total', data:sysCpuMerged, borderColor:'#ffffff', backgroundColor:'transparent',
            fill:false, tension:.3, pointRadius:0, borderWidth:1, borderDash:[4,3]});
        mkChart('cpu8k', {type:'line', data:{datasets:cCpuDS}, options:{
          ...cTSO,
          scales:{...cTSO.scales, y:{...cTSO.scales.y, stacked:false, min:0, max:100, title:{display:true,text:'% of machine',color:'#6b7d93'}}},
          plugins:{...cTSO.plugins, tooltip:{mode:'index',intersect:false, callbacks:{label:ctx=>ctx.raw?.y!=null?`${ctx.dataset.label}: ${ctx.raw.y}%`:''}}},
        }});
      }

      // Memory chart (RSS)
      if (hasMem) {
        const cMemDS = [];
        for (const s of PSERIES) {
          if (!memByKey[s.key]?.length) continue;
          cMemDS.push(cLinePts(memByKey[s.key], s.color, s.label));
        }
        mkChart('mem8k', {type:'line', data:{datasets:cMemDS}, options:{...cTSO, ...cYTitle('MB')}});
      }

      // Context switch chart
      if (hasCs) {
        const cCsDS = [];
        for (const s of PSERIES) {
          if (csVolByKey[s.key]?.length)   cCsDS.push(cLinePts(csVolByKey[s.key],   s.color, `${s.label} vol`));
          if (csInvolByKey[s.key]?.length) cCsDS.push(cLinePts(csInvolByKey[s.key], s.color, `${s.label} invol`, {borderDash:[3,2],borderWidth:1}));
        }
        mkChart('ctxsw8k', {type:'line', data:{datasets:cCsDS}, options:{...cTSO, ...cYTitle('/s')}});
      }

      // TCP chart
      if (hasTcpMerged || hasSysTcp8k) {
        const cTcpDS = [];
        if (tcpEstab.length)       cTcpDS.push(cLinePts(tcpEstab,       '#4da6ff', 'Established (ss)'));
        if (tcpTimewait.length)    cTcpDS.push(cLinePts(tcpTimewait,    '#f5a623', 'TIME_WAIT (ss)'));
        if (tcpClosed.length)      cTcpDS.push(cLinePts(tcpClosed,      '#4a5a6d', 'Closed (ss)'));
        if (sysTcpEstab.length)    cTcpDS.push(cLinePts(sysTcpEstab,    '#4da6ff', 'Established'));
        if (sysTcpTimewait.length) cTcpDS.push(cLinePts(sysTcpTimewait, '#f5a623', 'TIME_WAIT'));
        mkChart('tcp8k', {type:'line', data:{datasets:cTcpDS}, options:{...cTSO, ...cYTitle('connections')}});
      }

      // VMS chart
      if (hasVms8k) {
        const cVmsDS = [];
        for (const s of PSERIES) {
          if (!vmsByKey[s.key]?.length) continue;
          cVmsDS.push(cLinePts(vmsByKey[s.key], s.color, s.label));
        }
        mkChart('vms8k', {type:'line', data:{datasets:cVmsDS}, options:{...cTSO, ...cYTitle('MB')}});
      }

      // Disk I/O chart
      if (hasDisk8k) {
        const cDkDS = [];
        if (diskRdKbs.length)  cDkDS.push(cLinePts(diskRdKbs,  '#34d399', 'read KB/s'));
        if (diskWrKbs.length)  cDkDS.push(cLinePts(diskWrKbs,  '#4da6ff', 'write KB/s'));
        if (diskRdIops.length) cDkDS.push(cLinePts(diskRdIops, '#a78bfa', 'read IOPS',  {borderDash:[3,2],borderWidth:1}));
        if (diskWrIops.length) cDkDS.push(cLinePts(diskWrIops, '#f5a623', 'write IOPS', {borderDash:[3,2],borderWidth:1}));
        mkChart('disk8k', {type:'line', data:{datasets:cDkDS}, options:{...cTSO, ...cYTitle('KB/s')}});
      }

      // Interrupts chart
      if (hasIntr8k) {
        const cItDS = [];
        if (intrPts.length)  cItDS.push(cLinePts(intrPts,  '#f472b6', 'interrupts/s'));
        if (ctxSwPts.length) cItDS.push(cLinePts(ctxSwPts, '#38bdf8', 'ctx_switches/s', {borderDash:[3,2],borderWidth:1}));
        mkChart('intr8k', {type:'line', data:{datasets:cItDS}, options:{...cTSO, ...cYTitle('/s')}});
      }

      // UDP Errors chart
      if (hasUdp8k) {
        const cUdpDS = [];
        if (udpRxErr.length)  cUdpDS.push(cLinePts(udpRxErr,  '#ef5350', 'InErrors/s'));
        if (udpBufErr.length) cUdpDS.push(cLinePts(udpBufErr, '#f5a623', 'RcvbufErr/s', {borderDash:[3,2]}));
        mkChart('udp8k', {type:'line', data:{datasets:cUdpDS}, options:{...cTSO, ...cYTitle('/s')}});
      }

      // ── Top-10 CPU / RSS for 8k (merge across cases with time offset) ──────
      const merged8kTopCpu = {};
      const merged8kTopRss = {};
      rpcEntries.forEach(([, caseRes], idx) => {
        const off = caseOffsets[idx];
        for (const [name, pts] of Object.entries(caseRes.top_cpu || {})) {
          if (!merged8kTopCpu[name]) merged8kTopCpu[name] = [];
          merged8kTopCpu[name].push(...pts.map(p => [(p[0]||0)+off, p[1]]));
        }
        for (const [name, pts] of Object.entries(caseRes.top_rss || {})) {
          if (!merged8kTopRss[name]) merged8kTopRss[name] = [];
          merged8kTopRss[name].push(...pts.map(p => [(p[0]||0)+off, p[1]]));
        }
      });
      // Use cTSO (same x-axis as merged 8k charts)
      function render8kTop10(canvasId, seriesMap, yLabel) {
        if (!seriesMap || !Object.keys(seriesMap).length) return;
        const ds = Object.entries(seriesMap).map(([name, pts], i) => ({
          label: name,
          data: pts.map(p => ({x: p[0], y: p[1]})),
          borderColor: TOP_PALETTE[i % TOP_PALETTE.length],
          backgroundColor: 'transparent',
          tension: .3, pointRadius: 0, borderWidth: 1.5,
        }));
        mkChart(canvasId, {type:'line', data:{datasets:ds},
          options:{...cTSO, scales:{...cTSO.scales, y:{...cTSO.scales.y, title:{display:true,text:yLabel,color:'#6b7d93'}}}}});
      }
      render8kTop10('top8kCpuChart', merged8kTopCpu, '% of machine');
      render8kTop10('top8kRssChart', merged8kTopRss, 'MB');

      // ── Per-core CPU (8k merged) ──────────────────────────────────────────
      const merged8kPerCore = [];
      rpcEntries.forEach(([, caseRes], idx) => {
        const off = caseOffsets[idx];
        const cores = caseRes.system?.cpu_per_core;
        if (!Array.isArray(cores)) return;
        cores.forEach((pts, ci) => {
          if (!merged8kPerCore[ci]) merged8kPerCore[ci] = [];
          merged8kPerCore[ci].push(...pts.map(p => [(p[0]||0)+off, p[1]]), {x: off+caseMaxTs[idx]+0.01, y:null});
        });
      });
      if (merged8kPerCore.length) {
        const CORE_COLORS=['#4da6ff','#34d399','#f5a623','#ef5350','#a78bfa','#f472b6','#38bdf8','#fbbf24','#818cf8','#fb923c','#22d3ee','#a3e635','#e879f9','#94a3b8','#fb7185','#4ade80'];
        const pcDS = merged8kPerCore.map((pts,i)=>({label:`Core ${i}`,data:pts.map(p=>Array.isArray(p)?{x:p[0],y:p[1]}:p),borderColor:CORE_COLORS[i%CORE_COLORS.length],backgroundColor:'transparent',tension:.3,pointRadius:0,borderWidth:1}));
        mkChart('perCore8k',{type:'line',data:{datasets:pcDS},options:{...cTSO,scales:{...cTSO.scales,y:{...cTSO.scales.y,min:0,max:100,title:{display:true,text:'%',color:'#6b7d93'}}}}});
      }

      // ── Load Avg + Swap (8k merged) ──────────────────────────────────────
      const m8kLoad1=[], m8kLoad5=[], m8kLoad15=[], m8kSwap=[];
      rpcEntries.forEach(([,caseRes],idx)=>{
        const off=caseOffsets[idx]; const s=caseRes.system||{};
        const gap=[{x:off+caseMaxTs[idx]+0.01,y:null}];
        (s.loadavg_1||[]).forEach(p=>m8kLoad1.push({x:(p[0]||0)+off,y:p[1]})); m8kLoad1.push(...gap);
        (s.loadavg_5||[]).forEach(p=>m8kLoad5.push({x:(p[0]||0)+off,y:p[1]})); m8kLoad5.push(...gap);
        (s.loadavg_15||[]).forEach(p=>m8kLoad15.push({x:(p[0]||0)+off,y:p[1]})); m8kLoad15.push(...gap);
        (s.swap_used_mb||[]).forEach(p=>m8kSwap.push({x:(p[0]||0)+off,y:p[1]})); m8kSwap.push(...gap);
      });
      if (m8kLoad1.length) {
        const ldDS=[];
        if(m8kLoad1.length)  ldDS.push({label:'load 1m', data:m8kLoad1, borderColor:'#4da6ff',backgroundColor:'transparent',tension:.3,pointRadius:0,borderWidth:1.5});
        if(m8kLoad5.length)  ldDS.push({label:'load 5m', data:m8kLoad5, borderColor:'#f5a623',backgroundColor:'transparent',tension:.3,pointRadius:0,borderWidth:1.5});
        if(m8kLoad15.length) ldDS.push({label:'load 15m',data:m8kLoad15,borderColor:'#a78bfa',backgroundColor:'transparent',tension:.3,pointRadius:0,borderWidth:1.5,borderDash:[4,2]});
        if(m8kSwap.length)   ldDS.push({label:'swap MB', data:m8kSwap,  borderColor:'#ef5350',backgroundColor:'transparent',tension:.3,pointRadius:0,borderWidth:1,borderDash:[2,2]});
        mkChart('load8k',{type:'line',data:{datasets:ldDS},options:{...cTSO,...cYTitle('')}});
      }

      // ── Network throughput + packets (8k merged) ─────────────────────────
      const m8kRxKbs=[],m8kTxKbs=[],m8kRxPkts=[],m8kTxPkts=[],m8kDropIn=[],m8kDropOut=[];
      rpcEntries.forEach(([,caseRes],idx)=>{
        const off=caseOffsets[idx]; const s=caseRes.system||{};
        const gap=[{x:off+caseMaxTs[idx]+0.01,y:null}];
        (s.net_rx_kbs||[]).forEach(p=>m8kRxKbs.push({x:(p[0]||0)+off,y:p[1]})); m8kRxKbs.push(...gap);
        (s.net_tx_kbs||[]).forEach(p=>m8kTxKbs.push({x:(p[0]||0)+off,y:p[1]})); m8kTxKbs.push(...gap);
        (s.net_rx_pkts||[]).forEach(p=>m8kRxPkts.push({x:(p[0]||0)+off,y:p[1]})); m8kRxPkts.push(...gap);
        (s.net_tx_pkts||[]).forEach(p=>m8kTxPkts.push({x:(p[0]||0)+off,y:p[1]})); m8kTxPkts.push(...gap);
        (s.net_drop_in||[]).forEach(p=>m8kDropIn.push({x:(p[0]||0)+off,y:p[1]})); m8kDropIn.push(...gap);
        (s.net_drop_out||[]).forEach(p=>m8kDropOut.push({x:(p[0]||0)+off,y:p[1]})); m8kDropOut.push(...gap);
      });
      if(m8kRxKbs.length||m8kTxKbs.length){
        const nDS=[];
        if(m8kRxKbs.length) nDS.push({label:'RX KB/s',data:m8kRxKbs,borderColor:'#34d399',backgroundColor:'transparent',tension:.3,pointRadius:0,borderWidth:1.5});
        if(m8kTxKbs.length) nDS.push({label:'TX KB/s',data:m8kTxKbs,borderColor:'#4da6ff',backgroundColor:'transparent',tension:.3,pointRadius:0,borderWidth:1.5});
        mkChart('netKbs8k',{type:'line',data:{datasets:nDS},options:{...cTSO,...cYTitle('KB/s')}});
      }
      if(m8kRxPkts.length||m8kTxPkts.length){
        const pDS=[];
        if(m8kRxPkts.length)  pDS.push({label:'RX pkts/s', data:m8kRxPkts, borderColor:'#34d399',backgroundColor:'transparent',tension:.3,pointRadius:0,borderWidth:1.5});
        if(m8kTxPkts.length)  pDS.push({label:'TX pkts/s', data:m8kTxPkts, borderColor:'#4da6ff',backgroundColor:'transparent',tension:.3,pointRadius:0,borderWidth:1.5});
        if(m8kDropIn.length)  pDS.push({label:'drop_in/s', data:m8kDropIn, borderColor:'#ef5350',backgroundColor:'transparent',tension:.3,pointRadius:0,borderWidth:1.5,borderDash:[3,2]});
        if(m8kDropOut.length) pDS.push({label:'drop_out/s',data:m8kDropOut,borderColor:'#f5a623',backgroundColor:'transparent',tension:.3,pointRadius:0,borderWidth:1.5,borderDash:[3,2]});
        mkChart('netPkts8k',{type:'line',data:{datasets:pDS},options:{...cTSO,...cYTitle('/s')}});
      }
    }

  }
}

window.addEventListener('hashchange', navigate);
navigate();

})();
</script>
</body>
</html>
