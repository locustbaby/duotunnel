<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>duotunnel — Benchmark Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e14;--surface:#111820;--border:#1e2a3a;--border2:#2a3a4d;
  --text:#e0e8f0;--text2:#6b7d93;--text3:#4a5a6d;
  --blue:#4da6ff;--green:#34d399;--orange:#f5a623;--red:#ef5350;--purple:#a78bfa;
  --blue-dim:rgba(77,166,255,.12);--green-dim:rgba(52,211,153,.12);
  --panel:340px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:1400px;margin:0 auto;padding:32px 24px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
header h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
header h1 span{color:var(--text2);font-weight:400;margin-left:6px}
.meta{font-size:12px;color:var(--text2);font-family:'SF Mono',SFMono-Regular,Consolas,monospace}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
@media(max-width:900px){.cards{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
.card .lb{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:500}
.card .val{font-size:30px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.card .d{font-size:11px;margin-top:6px;font-weight:500}
.d-up{color:var(--green)}.d-down{color:var(--red)}.d-flat{color:var(--text3)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:960px){.row{grid-template-columns:1fr}}
.row.full>*{grid-column:1/-1}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;height:var(--panel);display:flex;flex-direction:column}
.panel.tall{height:400px}
.panel.auto{height:auto;max-height:500px}
.panel h3{font-size:12px;font-weight:600;margin-bottom:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.chart-area{flex:1;min-height:0;position:relative}
canvas{position:absolute;inset:0;width:100%!important;height:100%!important}
.sec{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:28px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.tbl-wrap{flex:1;min-height:0;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:6px 10px;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.3px;font-size:10px;position:sticky;top:0;background:var(--surface);z-index:1}
td{padding:6px 10px;border-bottom:1px solid var(--border);font-family:'SF Mono',SFMono-Regular,Consolas,monospace;font-size:11px}
tr:last-child td{border-bottom:none}
.c-good{color:var(--green)}.c-bad{color:var(--red)}.c-dim{color:var(--text3)}
.c-http{color:var(--blue)}.c-grpc{color:var(--green)}.c-ws{color:var(--orange)}
.bar{display:inline-block;height:10px;border-radius:2px;vertical-align:middle;margin-right:6px}
select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:12px;margin-bottom:10px;cursor:pointer;flex-shrink:0}
select:focus{outline:none;border-color:var(--blue)}
.empty{text-align:center;padding:80px 20px;color:var(--text2)}
.empty h2{margin-bottom:8px;font-weight:600}
.pill{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.pill-http{background:rgba(77,166,255,.15);color:var(--blue)}
.pill-grpc{background:rgba(52,211,153,.15);color:var(--green)}
.pill-ws{background:rgba(245,166,35,.15);color:var(--orange)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>duotunnel<span>benchmark</span></h1>
    <div class="meta" id="meta"></div>
  </header>
  <div id="app"></div>
</div>
<script>
(function(){
const root = document.getElementById('app');
const entries = (window.BENCHMARK_DATA && window.BENCHMARK_DATA.entries) || [];
if (!entries.length) {
  root.innerHTML = '<div class="empty"><h2>No benchmark data yet</h2><p>Push to main to trigger a benchmark run.</p></div>';
  return;
}

const latest = entries[entries.length - 1];
const prev = entries.length > 1 ? entries[entries.length - 2] : null;
const sc = latest.scenarios || [];
const sum = latest.summary || {};
const res = latest.resources || null;

const metaEl = document.getElementById('meta');
const cm = latest.commit || {};
if (typeof cm === 'object' && cm.id) {
  const s7 = cm.id.substring(0, 7);
  const lnk = cm.url ? `<a href="${cm.url}">${s7}</a>` : s7;
  metaEl.innerHTML = `${lnk} ${esc(cm.message || '')} · ${new Date(latest.timestamp).toLocaleString()}`;
} else {
  metaEl.textContent = ((typeof cm === 'string' ? cm : '').substring(0, 7)) + ' · ' + new Date(latest.timestamp).toLocaleString();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function r2(v) { return Math.round(v * 100) / 100; }
function fmt(v) { return v == null ? '—' : typeof v === 'number' ? v.toLocaleString(undefined, {maximumFractionDigits:1}) : v; }

function delta(cur, pre, invert) {
  if (pre == null || pre === 0) return '<span class="d d-flat">—</span>';
  const pct = r2((cur - pre) / pre * 100);
  const good = invert ? pct < 0 : pct > 0;
  const cls = Math.abs(pct) < 1 ? 'd-flat' : good ? 'd-up' : 'd-down';
  return `<span class="d ${cls}">${pct > 0 ? '+' : ''}${pct}%</span>`;
}

function pillFor(proto) {
  const p = proto.toLowerCase().replace(/\s/g,'');
  return `<span class="pill pill-${p}">${proto}</span>`;
}

function latencyBar(val, max, proto) {
  const colors = {HTTP:'var(--blue)',gRPC:'var(--green)',WS:'var(--orange)'};
  const w = max > 0 ? Math.max(2, Math.round(val / max * 80)) : 0;
  return `<span class="bar" style="width:${w}px;background:${colors[proto]||'var(--text3)'}"></span>`;
}

const prevSum = prev ? (prev.summary || {}) : {};

const maxP95 = Math.max(...sc.map(s => s.p95 || 0), 1);

let html = `
<div class="cards">
  <div class="card"><div class="lb">Total RPS</div><div class="val">${fmt(sum.totalRPS)}</div>${delta(sum.totalRPS||0, prevSum.totalRPS, false)}</div>
  <div class="card"><div class="lb">Error Rate</div><div class="val${(sum.totalErr||0)>2?' c-bad':' c-good'}">${sum.totalErr??0}%</div>${delta(sum.totalErr||0, prevSum.totalErr, true)}</div>
  <div class="card"><div class="lb">Total Requests</div><div class="val">${fmt(sum.totalRequests)}</div>${delta(sum.totalRequests||0, prevSum.totalRequests, false)}</div>
  <div class="card"><div class="lb">Scenarios</div><div class="val">${sc.length}</div><span class="d d-flat">${entries.length} runs</span></div>
</div>

<div class="sec">Scenario Results</div>
<div class="row full">
  <div class="panel auto" style="max-height:none">
    <h3>All Scenarios</h3>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Scenario</th><th>Proto</th><th>Dir</th><th>p50 (ms)</th><th>p95 (ms)</th><th>Latency</th><th>RPS</th><th>Requests</th><th>Err %</th></tr></thead>
        <tbody>`;

const categories = ['basic','body_size','stress'];
const catLabels = {basic:'Basic',body_size:'Body Size',stress:'Stress'};
for (const cat of categories) {
  const group = sc.filter(s => s.category === cat);
  if (!group.length) continue;
  html += `<tr><td colspan="9" style="padding:10px 10px 4px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:none">${catLabels[cat]||cat}</td></tr>`;
  for (const s of group) {
    const errCls = s.err > 0 ? (s.err > 5 ? 'c-bad' : 'c-bad') : 'c-dim';
    html += `<tr>
      <td style="color:var(--text)">${s.name}</td>
      <td>${pillFor(s.protocol)}</td>
      <td style="color:var(--text2)">${s.direction}</td>
      <td>${s.p50}</td>
      <td>${s.p95}</td>
      <td>${latencyBar(s.p95, maxP95, s.protocol)}${s.p95}</td>
      <td>${s.rps > 0 ? fmt(s.rps) : '<span class="c-dim">0</span>'}</td>
      <td>${s.requests > 0 ? fmt(s.requests) : '<span class="c-dim">0</span>'}</td>
      <td class="${errCls}">${s.err > 0 ? s.err + '%' : '0'}</td>
    </tr>`;
  }
}

html += `</tbody></table></div></div></div>`;

if (res) {
  html += `
  <div class="sec">Resources</div>
  <div class="row">
    <div class="panel"><h3>CPU Usage (%)</h3><div class="chart-area"><canvas id="cpuChart"></canvas></div></div>
    <div class="panel"><h3>Memory RSS (MB)</h3><div class="chart-area"><canvas id="memChart"></canvas></div></div>
  </div>`;
}

html += `
<div class="sec">Trends</div>
<div class="row full">
  <div class="panel tall"><h3>Historical Overview</h3><div class="chart-area"><canvas id="trendChart"></canvas></div></div>
</div>
<div class="row full">
  <div class="panel tall"><h3>Scenario Trend</h3><select id="scSel"></select><div class="chart-area"><canvas id="scTrend"></canvas></div></div>
</div>

<div class="sec">History</div>
<div class="row full">
  <div class="panel auto" style="max-height:none">
    <h3>Run History</h3>
    <div class="tbl-wrap" id="histTable"></div>
  </div>
</div>`;

root.innerHTML = html;

const CO = {
  responsive:true, maintainAspectRatio:false,
  plugins:{legend:{labels:{color:'#6b7d93',font:{size:10}}}},
  scales:{
    x:{ticks:{color:'#6b7d93',font:{size:9}},grid:{color:'rgba(30,42,58,.5)'}},
    y:{ticks:{color:'#6b7d93'},grid:{color:'rgba(30,42,58,.5)'},beginAtZero:true},
  },
};

function mkChart(id, cfg) {
  const cv = document.getElementById(id);
  if (!cv) return;
  return new Chart(cv, cfg);
}

if (res) {
  const cpuDS = [];
  if (res.server?.cpu?.length) cpuDS.push({label:'Server',data:res.server.cpu.map(p=>({x:p.t,y:p.v})),borderColor:'#4da6ff',backgroundColor:'transparent',tension:.3,pointRadius:1,borderWidth:1.5});
  if (res.client?.cpu?.length) cpuDS.push({label:'Client',data:res.client.cpu.map(p=>({x:p.t,y:p.v})),borderColor:'#34d399',backgroundColor:'transparent',tension:.3,pointRadius:1,borderWidth:1.5});
  if (res.system?.cpu?.length) cpuDS.push({label:'System',data:res.system.cpu.map(p=>({x:p.t,y:p.v})),borderColor:'#f5a623',backgroundColor:'transparent',tension:.3,pointRadius:1,borderWidth:1.5,borderDash:[4,2]});
  if (cpuDS.length) mkChart('cpuChart',{type:'scatter',data:{datasets:cpuDS},options:{...CO,showLine:true,scales:{x:{...CO.scales.x,type:'linear',title:{display:true,text:'sec',color:'#6b7d93'}},y:{...CO.scales.y,title:{display:true,text:'%',color:'#6b7d93'}}}}});

  const memDS = [];
  if (res.server?.rss?.length) memDS.push({label:'Server',data:res.server.rss.map(p=>({x:p.t,y:p.v})),borderColor:'#4da6ff',backgroundColor:'transparent',tension:.3,pointRadius:1,borderWidth:1.5});
  if (res.client?.rss?.length) memDS.push({label:'Client',data:res.client.rss.map(p=>({x:p.t,y:p.v})),borderColor:'#34d399',backgroundColor:'transparent',tension:.3,pointRadius:1,borderWidth:1.5});
  if (memDS.length) mkChart('memChart',{type:'scatter',data:{datasets:memDS},options:{...CO,showLine:true,scales:{x:{...CO.scales.x,type:'linear',title:{display:true,text:'sec',color:'#6b7d93'}},y:{...CO.scales.y,title:{display:true,text:'MB',color:'#6b7d93'}}}}});
}

if (entries.length >= 2) {
  const lbl = entries.map(e => { const c = e.commit; return typeof c==='object'?(c.id||'').substring(0,7):(c||'').substring(0,7); });
  const rpsD = entries.map(e => e.summary?.totalRPS ?? null);
  const errD = entries.map(e => e.summary?.totalErr ?? null);
  function avgP95(entry, cat) { const s=(entry.scenarios||[]).filter(x=>x.category===cat); return s.length ? r2(s.reduce((a,x)=>a+x.p95,0)/s.length) : null; }
  const bP95 = entries.map(e => avgP95(e,'basic'));
  const sP95 = entries.map(e => avgP95(e,'stress'));

  mkChart('trendChart',{type:'line',data:{labels:lbl,datasets:[
    {label:'Total RPS',data:rpsD,borderColor:'#4da6ff',backgroundColor:'transparent',yAxisID:'y',tension:.3,pointRadius:3,borderWidth:2},
    {label:'Error %',data:errD,borderColor:'#ef5350',backgroundColor:'transparent',yAxisID:'y1',tension:.3,pointRadius:3,borderWidth:2},
    {label:'Basic avg p95',data:bP95,borderColor:'#34d399',backgroundColor:'transparent',yAxisID:'y1',tension:.3,pointRadius:2,borderWidth:1.5,borderDash:[4,2]},
    {label:'Stress avg p95',data:sP95,borderColor:'#f5a623',backgroundColor:'transparent',yAxisID:'y1',tension:.3,pointRadius:2,borderWidth:1.5,borderDash:[4,2]},
  ]},options:{...CO,scales:{
    x:CO.scales.x,
    y:{type:'linear',position:'left',title:{display:true,text:'RPS',color:'#6b7d93'},ticks:{color:'#6b7d93'},grid:{color:'rgba(30,42,58,.5)'},beginAtZero:true},
    y1:{type:'linear',position:'right',title:{display:true,text:'ms / %',color:'#6b7d93'},ticks:{color:'#6b7d93'},grid:{drawOnChartArea:false},beginAtZero:true},
  }}});
} else {
  const el = document.getElementById('trendChart');
  if (el) el.closest('.panel').querySelector('h3').textContent = 'Historical Overview — need >= 2 runs';
}

(function scenarioTrend(){
  const sel = document.getElementById('scSel');
  if (!sel) return;
  const names = [...new Set(entries.flatMap(e=>(e.scenarios||[]).map(s=>s.name)))].sort();
  if (!names.length) return;
  names.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n.replace(/_/g,' ');sel.appendChild(o);});

  let cur = null;
  function draw(name) {
    if (cur) cur.destroy();
    const lbl = entries.map(e=>{const c=e.commit;return typeof c==='object'?(c.id||'').substring(0,7):(c||'').substring(0,7);});
    const p50 = entries.map(e=>{const s=(e.scenarios||[]).find(x=>x.name===name);return s?s.p50:null;});
    const p95 = entries.map(e=>{const s=(e.scenarios||[]).find(x=>x.name===name);return s?s.p95:null;});
    const p99 = entries.map(e=>{const s=(e.scenarios||[]).find(x=>x.name===name);return s?.p99??null;});
    const ds = [
      {label:'p50',data:p50,borderColor:'#4da6ff',backgroundColor:'transparent',tension:.3,pointRadius:3,borderWidth:2},
      {label:'p95',data:p95,borderColor:'#34d399',backgroundColor:'transparent',tension:.3,pointRadius:3,borderWidth:2},
    ];
    if (p99.some(v=>v!=null)) ds.push({label:'p99',data:p99,borderColor:'#f5a623',backgroundColor:'transparent',tension:.3,pointRadius:3,borderWidth:2,borderDash:[4,2]});
    cur = mkChart('scTrend',{type:'line',data:{labels:lbl,datasets:ds},options:{...CO,plugins:{...CO.plugins,tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw} ms`}}},scales:{x:CO.scales.x,y:{...CO.scales.y,title:{display:true,text:'ms',color:'#6b7d93'}}}}});
  }
  sel.addEventListener('change',()=>draw(sel.value));
  draw(names[0]);
})();

(function historyTable(){
  const el = document.getElementById('histTable');
  if (!el) return;
  const last = entries.slice(-15);
  let h = '<table><thead><tr><th>Commit</th><th>Date</th><th>RPS</th><th>Δ</th><th>Err %</th><th>Δ</th><th>Reqs</th><th>Scenarios</th></tr></thead><tbody>';
  for (let i = last.length - 1; i >= 0; i--) {
    const e = last[i];
    const p = i > 0 ? last[i-1] : null;
    const c = e.commit || {};
    const sha = typeof c==='object'?(c.id||'').substring(0,7):(c||'').substring(0,7);
    const url = typeof c==='object'&&c.url?c.url:'';
    const link = url ? `<a href="${url}">${sha}</a>` : sha;
    const date = new Date(e.timestamp).toLocaleDateString();
    const rps = e.summary?.totalRPS??0;
    const err = e.summary?.totalErr??0;
    const reqs = e.summary?.totalRequests??0;
    const nsc = (e.scenarios||[]).length;

    let dR='—', dE='—';
    if (p) {
      const pR = p.summary?.totalRPS??0;
      const pE = p.summary?.totalErr??0;
      if (pR>0) { const d=r2(rps-pR); dR=`<span class="${d>0?'c-good':d<0?'c-bad':'c-dim'}">${d>0?'+':''}${d}</span>`; }
      const dEv=r2(err-pE); dE=`<span class="${dEv<0?'c-good':dEv>0?'c-bad':'c-dim'}">${dEv>0?'+':''}${dEv}%</span>`;
    }
    h += `<tr><td>${link}</td><td style="color:var(--text2)">${date}</td><td>${fmt(rps)}</td><td>${dR}</td><td>${err}%</td><td>${dE}</td><td>${fmt(reqs)}</td><td>${nsc}</td></tr>`;
  }
  h += '</tbody></table>';
  el.innerHTML = h;
})();

})();
</script>
</body>
</html>
