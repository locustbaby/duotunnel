name: CI
on:
  push:
    branches: [main, "fix/**", "feat/**"]
    paths:
      - "server/**"
      - "client/**"
      - "tunnel-lib/**"
      - "tunnel-service/**"
      - "tunnel-store/**"
      - "ci-helpers/**"
      - "bench/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - "client/**"
      - "tunnel-lib/**"
      - "tunnel-service/**"
      - "tunnel-store/**"
      - "ci-helpers/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"
  workflow_dispatch:
    inputs:
      # ── Build ─────────────────────────────────────────────────────────────────
      build_profile:
        description: 'Build profile: release | dial9 | both'
        type: choice
        options: [both, release, dial9]
        default: both
      # ── Test ──────────────────────────────────────────────────────────────────
      run_unit:
        description: 'Run unit tests + clippy'
        type: boolean
        default: true
      run_integration:
        description: 'Run integration tests (all protocols)'
        type: boolean
        default: true
      run_stress:
        description: 'Run k6 stress test (core profile)'
        type: boolean
        default: true
      run_stress_trace:
        description: 'Run 8k stress trace (dial9 profiling)'
        type: boolean
        default: true
      run_frp:
        description: 'Run frp baseline benchmark alongside stress test'
        type: boolean
        default: true
      worker_threads:
        description: 'Tokio worker threads for server/client in stress-trace (0 = CPU count)'
        type: number
        default: 0
      stress_quic_connections:
        description: 'QUIC client connection count for stress jobs'
        type: number
        default: 4
      # ── Monitor ───────────────────────────────────────────────────────────────
      monitor_cpu:
        description: 'Collect CPU metrics (mpstat + /proc per-process)'
        type: boolean
        default: true
      monitor_io:
        description: 'Collect disk I/O metrics (pidstat -d)'
        type: boolean
        default: true
      monitor_ctxsw:
        description: 'Collect context-switch metrics (pidstat -w)'
        type: boolean
        default: true
      monitor_net:
        description: 'Collect network metrics (sar -n DEV)'
        type: boolean
        default: true
      monitor_tcp:
        description: 'Collect TCP connection state metrics (ss snapshot)'
        type: boolean
        default: true
      monitor_psi:
        description: 'Collect pressure-stall metrics (PSI avg10)'
        type: boolean
        default: true
      monitor_paging:
        description: 'Collect paging metrics (sar -B)'
        type: boolean
        default: true
      # ── Publish ───────────────────────────────────────────────────────────────
      tune_kernel:
        description: 'Apply kernel tuning (tune-os.sh) before stress tests'
        type: boolean
        default: true
      publish_pages:
        description: 'Publish benchmark results to gh-pages (auto-enabled on main push)'
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Share one sccache server across both jobs via GHA cache
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  # Override .cargo/config.toml target-cpu=native — CI runners have
  # varying CPU micro-architectures so we must build portable binaries.
  CARGO_ENCODED_RUSTFLAGS: "-Copt-level=3"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Unit tests + clippy  (no binary build, fast feedback)
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests & Lint
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.run_unit != false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9

      - name: Cache cargo registry + index
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: cargo test (all workspace crates)
        run: cargo test --workspace

      - name: cargo clippy (deny warnings)
        run: cargo clippy --workspace -- -D warnings

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2a: Build release binaries — shared by integration-test and stress-test
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (release)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.build_profile == 'release' || inputs.build_profile == 'both'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9

      - name: Cache cargo registry + index
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Build all binaries
        run: cargo build --release --workspace

      - name: Upload binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-bins-${{ github.run_id }}
          retention-days: 1
          path: |
            target/release/server
            target/release/client
            target/release/tunnel-ctld
            target/release/http-echo-server
            target/release/ws-echo-server
            target/release/grpc-echo-server
            target/release/ci-test-client

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2b: Build dial9 binaries — shared by stress-trace-8k
  # ─────────────────────────────────────────────────────────────────────────────
  build-dial9:
    name: Build (dial9 + symbols)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.build_profile == 'dial9' || inputs.build_profile == 'both'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@d651010b8da762cde178750d8eda7b5febfe147a # v0.0.9

      - name: Cache cargo registry + index
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Build all binaries (dial9 + symbols)
        run: |
          SEP=$'\x1f'
          CARGO_PROFILE_RELEASE_STRIP=none \
          CARGO_ENCODED_RUSTFLAGS="${CARGO_ENCODED_RUSTFLAGS}${SEP}-Cforce-frame-pointers=yes${SEP}-Cdebuginfo=1${SEP}--cfg${SEP}tokio_unstable" \
            cargo build --release --workspace \
              --features server/dial9-telemetry \
              --features client/dial9-telemetry

      - name: Upload binaries (dial9)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-bins-dial9-${{ github.run_id }}
          retention-days: 1
          path: |
            target/release/server
            target/release/client
            target/release/tunnel-ctld
            target/release/http-echo-server
            target/release/ws-echo-server
            target/release/grpc-echo-server

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Integration tests — end-to-end, all protocols
  #
  # Local backends (ci-helpers binaries, always reachable):
  #   http-echo-server  127.0.0.1:9999  — HTTP/1.1 + HTTP/2 JSON echo
  #   ws-echo-server    127.0.0.1:8765  — WebSocket frame echo
  #   grpc-echo-server  127.0.0.1:50051 — gRPC Health + EchoService
  #
  # External backends (real internet, continue-on-error):
  #   echo.free.beeceptor.com:443       — HTTP echo (HTTPS, may rate-limit)
  #   wss://echo.websocket.org          — WebSocket echo (WSS)
  #   https://grpc-echo.semior.dev:443  — gRPC echo (HTTPS)
  #
  # /etc/hosts maps test domains to 127.0.0.1 for Host-header-based routing:
  #   echo.local / ws.local / grpc.local → tunnel-server http listener :8080
  #
  # Tunnel topology:
  #   ci-test-client
  #     │ ingress → echo.local:8080 (server http listener) ──QUIC:10086──→ client
  #     │                                                                   │ egress
  #     │ egress  → 127.0.0.1:8082 (client http_entry_port)                │
  #     └─────────────────────────────────────────────────────────────────────→ backends
  #
  # Test sections:
  #   SECTION 1 — External backends (continue-on-error)
  #   SECTION 2 — HTTP/1.1 local: GET/POST/HEAD/DELETE/custom-header/stability
  #   SECTION 3 — HTTP/2 h2c: GET/POST ingress + egress
  #   SECTION 4 — WebSocket local: echo + multi-message
  #   SECTION 5 — gRPC local: Health + EchoService/Echo
  #   SECTION 6 — Bidirectional concurrent + mixed-protocol
  #   SECTION 7 — Standalone mode: SQLite auto-seed, token CLI, HTTP/WS/gRPC, hot-reload, token rotate
  # ─────────────────────────────────────────────────────────────────────────────
  integration-test:
    name: Integration Test (all protocols)
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && needs.build.result == 'success' && (github.event_name != 'workflow_dispatch' || inputs.run_integration != false)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          name: release-bins-${{ github.run_id }}
          path: target/release

      - name: Mark binaries executable
        run: chmod +x target/release/server target/release/client target/release/tunnel-ctld target/release/http-echo-server target/release/ws-echo-server target/release/grpc-echo-server target/release/ci-test-client

      # /etc/hosts — map test domains to 127.0.0.1
      - name: Configure /etc/hosts for test domains
        run: |
          {
            echo "127.0.0.1  echo.local"
            echo "127.0.0.1  ws.local"
            echo "127.0.0.1  grpc.local"
            echo "127.0.0.1  echo.beeceptor.test"
            echo "127.0.0.1  ws.ext.test"
            echo "127.0.0.1  grpc.ext.test"
            for i in $(seq 1 50); do printf "127.0.0.1  echo-%02d.local\n" "$i"; done
          } | sudo tee -a /etc/hosts

      # ─── Start all backend servers in parallel ────────────────────────────────
      - name: Start backend servers (http-echo, ws-echo, grpc-echo)
        timeout-minutes: 1
        run: |
          ./target/release/http-echo-server 9999  > /tmp/http-echo.log  2>&1 & echo $! > /tmp/http-echo.pid
          ./target/release/ws-echo-server   8765  > /tmp/ws-echo.log    2>&1 & echo $! > /tmp/ws-echo.pid
          ./target/release/grpc-echo-server 50051 > /tmp/grpc-echo.log  2>&1 & echo $! > /tmp/grpc-echo.pid
          # Wait for http-echo (poll); ws/grpc get 1s grace below
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:9999/ > /dev/null && break
            sleep 0.2
          done
          sleep 0.5  # ws + grpc startup grace
          echo "All backend servers ready"

      # ─── Start tunnel (ctld → server → client) ───────────────────────────────
      - name: Start tunnel-ctld
        timeout-minutes: 1
        run: |
          mkdir -p data
          ./target/release/tunnel-ctld --config ci-helpers/ctld.yaml \
            > /tmp/ci-ctld.log 2>&1 &
          echo $! > /tmp/ctld.pid
          # Wait for ctld healthz (ready after DB init + routing seed)
          for i in $(seq 1 60); do
            curl -sf --max-time 1 http://127.0.0.1:9091/healthz > /dev/null 2>&1 && break
            sleep 0.5
          done
          curl -sf --max-time 2 http://127.0.0.1:9091/healthz > /dev/null 2>&1 \
            || { echo "ERROR: ctld healthz never became ready"; cat /tmp/ci-ctld.log; exit 1; }
          echo "ctld ready"

      - name: Start tunnel server (ctld-managed mode)
        timeout-minutes: 1
        run: |
          ./target/release/server --config ci-helpers/server.yaml \
            --ctld-addr 127.0.0.1:7788 \
            > /tmp/ci-server.log 2>&1 &
          echo $! > /tmp/server.pid
          for i in $(seq 1 60); do
            curl -sf --max-time 1 http://127.0.0.1:9090/healthz > /dev/null 2>&1 && break
            sleep 0.5
          done
          curl -sf --max-time 2 http://127.0.0.1:9090/healthz > /dev/null 2>&1 \
            || { echo "ERROR: server healthz never became ready"; cat /tmp/ci-server.log; exit 1; }
          echo "Tunnel server ready"

      - name: Create client token
        timeout-minutes: 1
        run: |
          TOKEN=$(./target/release/tunnel-ctld --config ci-helpers/ctld.yaml \
            client create-client ci-group 2>/dev/null | grep '^Token:' | awk '{print $2}' \
            || ./target/release/tunnel-ctld --config ci-helpers/ctld.yaml \
            client rotate-token ci-group 2>/dev/null | awk '{print $NF}')
          if [ -z "$TOKEN" ]; then echo "ERROR: failed to obtain token"; exit 1; fi
          echo "$TOKEN" > /tmp/ci-token.txt
          python3 -c "import re,sys; f='ci-helpers/client.yaml'; t=sys.argv[1]; c=open(f).read(); c=re.sub(r'^auth_token:.*','auth_token: \"'+t+'\"',c,flags=re.MULTILINE); open(f,'w').write(c)" "$TOKEN"
          # Wait for ctld poll to push the new token to server (~1500ms poll interval)
          sleep 3
          echo "Token ready, server notified"

      - name: Start tunnel client and wait for login
        timeout-minutes: 1
        run: |
          ./target/release/client --config ci-helpers/client.yaml > /tmp/ci-client.log 2>&1 &
          echo $! > /tmp/client.pid
          for i in $(seq 1 60); do
            if ! kill -0 "$(cat /tmp/client.pid)" 2>/dev/null; then
              break
            fi
            curl -sf --max-time 1 http://127.0.0.1:9092/healthz > /dev/null 2>&1 && break
            sleep 0.5
          done
          if ! kill -0 "$(cat /tmp/client.pid)" 2>/dev/null; then
            echo "ERROR: client did not login"
            echo "=== ctld ===" && cat /tmp/ci-ctld.log
            echo "=== server ===" && cat /tmp/ci-server.log
            echo "=== client ===" && cat /tmp/ci-client.log
            exit 1
          fi
          if ! curl -sf --max-time 2 http://127.0.0.1:9092/healthz > /dev/null 2>&1; then
            echo "ERROR: client healthz not ready"
            echo "=== ctld ===" && cat /tmp/ci-ctld.log
            echo "=== server ===" && cat /tmp/ci-server.log
            echo "=== client ===" && cat /tmp/ci-client.log
            exit 1
          fi
          echo "Client connected and logged in"

      # ═══════════════════════════════════════════════════════════════════════════
      #  SECTION 1 — External backends (continue-on-error: real internet services)
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "[Ext-gRPC] Health/Check — grpc.ext.test:8080 → grpc-echo.semior.dev:443"
        continue-on-error: true
        run: |
          ./target/release/ci-test-client grpc "grpc.ext.test:8080" --service ""

      - name: "[Ext-gRPC] EchoService/Echo via tunnel — grpc.ext.test:8080"
        continue-on-error: true
        run: |
          ./target/release/ci-test-client grpc-echo "grpc.ext.test:8080" \
            --ping "ci-tunnel-ext-echo"

      - name: "[Ext-gRPC] EchoService/Echo direct — grpc-echo.semior.dev:443"
        continue-on-error: true
        run: |
          ./target/release/ci-test-client grpc-echo "grpc-echo.semior.dev:443" \
            --tls --ping "ci-direct-echo"

      - name: "[Ext-HTTP] GET ingress — echo.beeceptor.test → beeceptor"
        continue-on-error: true
        run: |
          ./target/release/ci-test-client http "http://echo.beeceptor.test:8080/" \
            --allow-status 429

      - name: "[Ext-HTTP] POST body ingress — echo.beeceptor.test → beeceptor"
        continue-on-error: true
        run: |
          ./target/release/ci-test-client http "http://echo.beeceptor.test:8080/" \
            --method POST \
            --body '{"ci":"ext-post-test"}' \
            --allow-status 429

      - name: "[Ext-HTTP] GET egress — client:8082 → server → beeceptor"
        continue-on-error: true
        run: |
          ./target/release/ci-test-client http "http://127.0.0.1:8082/" \
            --header "Host: echo.free.beeceptor.com" \
            --allow-status 429

      - name: "[Ext-WS] Echo ingress — ws.ext.test → echo.websocket.org"
        continue-on-error: true
        run: |
          ./target/release/ci-test-client ws "ws://ws.ext.test:8080" --message "ext-ws-hello"

      - name: "[Ext-Bidir] 3 concurrent ingress + 3 concurrent egress"
        continue-on-error: true
        run: |
          for i in $(seq 1 3); do
            (./target/release/ci-test-client http "http://echo.beeceptor.test:8080/" \
               --allow-status 429 \
               > /tmp/ext-bidir-in-$i.txt 2>&1 && echo "in-$i:OK" || echo "in-$i:FAIL") &
            (./target/release/ci-test-client http "http://127.0.0.1:8082/" \
               --header "Host: echo.free.beeceptor.com" \
               --allow-status 429 \
               > /tmp/ext-bidir-eg-$i.txt 2>&1 && echo "eg-$i:OK" || echo "eg-$i:FAIL") &
          done
          wait
          FAIL=0
          for i in $(seq 1 3); do
            R_IN=$(tail -1 /tmp/ext-bidir-in-$i.txt); R_EG=$(tail -1 /tmp/ext-bidir-eg-$i.txt)
            echo "  $R_IN  |  $R_EG"
            echo "$R_IN" | grep -q "FAIL" && FAIL=$((FAIL+1)) || true
            echo "$R_EG" | grep -q "FAIL" && FAIL=$((FAIL+1)) || true
          done
          if [ "$FAIL" -gt 2 ]; then echo "FAIL: $FAIL/6"; exit 1; fi
          echo "PASS: $((6-FAIL))/6"

      # ═══════════════════════════════════════════════════════════════════════════
      #  SECTION 2 — HTTP/1.1 (local http-echo-server)
      #  Covers: GET, POST, HEAD, DELETE, custom headers, stability
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "[HTTP] GET ingress — echo.local:8080"
        run: |
          ./target/release/ci-test-client http "http://echo.local:8080/"

      - name: "[HTTP] POST + body verify ingress"
        run: |
          ./target/release/ci-test-client http "http://echo.local:8080/" \
            --method POST \
            --body '{"tunnel":"ci","test":"post-body-123"}' \
            --expect-body "post-body-123"

      - name: "[HTTP] HEAD ingress — no body, status 200"
        run: |
          ./target/release/ci-test-client http "http://echo.local:8080/" \
            --method HEAD \
            --allow-status 200

      - name: "[HTTP] DELETE ingress — method echoed in response"
        run: |
          ./target/release/ci-test-client http "http://echo.local:8080/" \
            --method DELETE \
            --expect-body "DELETE"

      - name: "[HTTP] Custom header forwarding ingress"
        run: |
          ./target/release/ci-test-client http "http://echo.local:8080/" \
            --header "X-Tunnel-Test: reliable" \
            --expect-body "x-tunnel-test"

      - name: "[HTTP] Stability test (10 requests, >= 8 must succeed)"
        run: |
          OK=0
          for i in $(seq 1 10); do
            if ./target/release/ci-test-client http "http://echo.local:8080/" > /dev/null 2>&1; then
              printf "  OK(%s)" "$i"; OK=$((OK+1))
            else
              printf "  FAIL(%s)" "$i"
            fi
          done
          echo ""
          if [ "$OK" -ge 8 ]; then echo "PASS: $OK/10"
          else echo "FAIL: only $OK/10 (expected >= 8)"; exit 1; fi

      - name: "[HTTP] GET egress — client:8082 → server → http-echo"
        run: |
          ./target/release/ci-test-client http "http://127.0.0.1:8082/" \
            --header "Host: echo.local"

      - name: "[HTTP] POST + body verify egress"
        run: |
          ./target/release/ci-test-client http "http://127.0.0.1:8082/" \
            --method POST \
            --header "Host: echo.local" \
            --body '{"tunnel":"ci","test":"egress-post-456"}' \
            --expect-body "egress-post-456"

      - name: "[HTTP] DELETE egress — method echoed"
        run: |
          ./target/release/ci-test-client http "http://127.0.0.1:8082/" \
            --method DELETE \
            --header "Host: echo.local" \
            --expect-body "DELETE"

      - name: "[HTTP] Custom header forwarding egress"
        run: |
          ./target/release/ci-test-client http "http://127.0.0.1:8082/" \
            --header "Host: echo.local" \
            --header "X-Egress-Test: forwarded" \
            --expect-body "x-egress-test"

      # ═══════════════════════════════════════════════════════════════════════════
      #  SECTION 3 — HTTP/2 h2c (byte-level forwarding, same as curl --http2)
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "[HTTP2] GET h2c ingress — echo.local:8080"
        run: |
          ./target/release/ci-test-client http2 "http://echo.local:8080/"

      - name: "[HTTP2] POST h2c + body verify ingress"
        run: |
          ./target/release/ci-test-client http2 "http://echo.local:8080/" \
            --method POST \
            --body '{"h2":"post-test"}' \
            --expect-body "post-test"

      - name: "[HTTP2] Custom header forwarding h2c ingress"
        run: |
          ./target/release/ci-test-client http2 "http://echo.local:8080/" \
            --header "X-H2-Test: h2c-header" \
            --expect-body "x-h2-test"

      - name: "[HTTP2] GET h2c egress — client:8082"
        run: |
          ./target/release/ci-test-client http2 "http://127.0.0.1:8082/" \
            --header "Host: echo.local"

      - name: "[HTTP2] POST h2c + body verify egress"
        run: |
          ./target/release/ci-test-client http2 "http://127.0.0.1:8082/" \
            --header "Host: echo.local" \
            --method POST \
            --body '{"h2":"egress-post-test"}' \
            --expect-body "egress-post-test"

      # ═══════════════════════════════════════════════════════════════════════════
      #  SECTION 4 — WebSocket (local ws-echo-server)
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "[WS] Echo ingress — ws.local:8080"
        run: |
          ./target/release/ci-test-client ws "ws://ws.local:8080" --message "hello-ws-tunnel"

      - name: "[WS] Custom message echo ingress"
        run: |
          ./target/release/ci-test-client ws "ws://ws.local:8080" --message "ci-msg-two"

      - name: "[WS] Large message echo ingress"
        run: |
          ./target/release/ci-test-client ws "ws://ws.local:8080" \
            --message "$(python3 -c "print('x' * 4096)")"

      # ═══════════════════════════════════════════════════════════════════════════
      #  SECTION 5 — gRPC (via H2 proxy path, local grpc-echo-server)
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "[gRPC] Health/Check SERVING — grpc.local:8080"
        run: |
          ./target/release/ci-test-client grpc "grpc.local:8080" --service ""

      - name: "[gRPC] EchoService/Echo body verify — grpc.local:8080"
        run: |
          ./target/release/ci-test-client grpc-echo "grpc.local:8080" \
            --ping "ci-local-echo-test"

      - name: "[gRPC] EchoService/Echo header forwarding — grpc.local:8080"
        run: |
          # Verify headers map is non-empty (tunnel forwarded gRPC metadata)
          ./target/release/ci-test-client grpc-echo "grpc.local:8080" \
            --ping "ci-header-check"

      # ═══════════════════════════════════════════════════════════════════════════
      #  SECTION 6 — Bidirectional concurrent + mixed-protocol
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "[Bidir] 5 concurrent HTTP/1.1 ingress + 5 egress"
        run: |
          for i in $(seq 1 5); do
            (./target/release/ci-test-client http "http://echo.local:8080/" \
               > /tmp/bidir-in-$i.txt 2>&1 && echo "in-$i:OK" >> /tmp/bidir-in-$i.txt \
               || echo "in-$i:FAIL" >> /tmp/bidir-in-$i.txt) &
            (./target/release/ci-test-client http "http://127.0.0.1:8082/" \
               --header "Host: echo.local" \
               > /tmp/bidir-eg-$i.txt 2>&1 && echo "eg-$i:OK" >> /tmp/bidir-eg-$i.txt \
               || echo "eg-$i:FAIL" >> /tmp/bidir-eg-$i.txt) &
          done
          wait
          FAIL=0
          for i in $(seq 1 5); do
            R_IN=$(tail -1 /tmp/bidir-in-$i.txt); R_EG=$(tail -1 /tmp/bidir-eg-$i.txt)
            echo "  $R_IN  |  $R_EG"
            echo "$R_IN" | grep -q "FAIL" && FAIL=$((FAIL+1)) || true
            echo "$R_EG" | grep -q "FAIL" && FAIL=$((FAIL+1)) || true
          done
          if [ "$FAIL" -gt 1 ]; then echo "FAIL: $FAIL/10"; exit 1; fi
          echo "PASS: $((10-FAIL))/10"

      - name: "[Bidir] Mixed protocols concurrent (HTTP1 + HTTP2 + WS + gRPC ingress)"
        run: |
          (./target/release/ci-test-client http "http://echo.local:8080/" \
             > /tmp/mixed-h1.txt 2>&1 && echo "h1:OK" || echo "h1:FAIL") >> /tmp/mixed-h1.txt &
          (./target/release/ci-test-client http2 "http://echo.local:8080/" \
             > /tmp/mixed-h2.txt 2>&1 && echo "h2:OK" || echo "h2:FAIL") >> /tmp/mixed-h2.txt &
          (./target/release/ci-test-client ws "ws://ws.local:8080" --message "concurrent-ws" \
             && echo "ws:OK" || echo "ws:FAIL") > /tmp/mixed-ws.txt 2>&1 &
          (./target/release/ci-test-client grpc-echo "grpc.local:8080" --ping "concurrent-grpc" \
             && echo "grpc:OK" || echo "grpc:FAIL") > /tmp/mixed-grpc.txt 2>&1 &
          wait
          R_H1=$(tail -1 /tmp/mixed-h1.txt)
          R_H2=$(tail -1 /tmp/mixed-h2.txt)
          R_WS=$(tail -1 /tmp/mixed-ws.txt)
          R_GRPC=$(tail -1 /tmp/mixed-grpc.txt)
          echo "  $R_H1 | $R_H2 | $R_WS | $R_GRPC"
          echo "$R_H1$R_H2$R_WS$R_GRPC" | grep -q "FAIL" && {
            echo "FAIL: at least one mixed-protocol request failed"; exit 1
          }
          echo "PASS"

      - name: "[Bidir] 3 concurrent gRPC Echo ingress"
        run: |
          for i in $(seq 1 3); do
            (./target/release/ci-test-client grpc-echo "grpc.local:8080" \
               --ping "concurrent-grpc-$i" \
               > /tmp/grpc-conc-$i.txt 2>&1 \
               && echo "grpc-$i:OK" || echo "grpc-$i:FAIL") &
          done
          wait
          FAIL=0
          for i in $(seq 1 3); do
            R=$(tail -1 /tmp/grpc-conc-$i.txt)
            echo "  $R"
            echo "$R" | grep -q "FAIL" && FAIL=$((FAIL+1)) || true
          done
          if [ "$FAIL" -gt 0 ]; then echo "FAIL: $FAIL/3 gRPC concurrent"; exit 1; fi
          echo "PASS: 3/3 gRPC concurrent"

      # ═══════════════════════════════════════════════════════════════════════════
      #  SECTION 7 — Standalone mode smoke test
      #
      #  Verifies the server can run without ctld:
      #    7-A: first-boot SQLite auto-seed from YAML
      #    7-B: `server token create` CLI
      #    7-C: client connects with standalone-issued token
      #    7-D: HTTP GET ingress
      #    7-E: HTTP POST + body verify ingress
      #    7-F: WebSocket ingress
      #    7-G: gRPC Health ingress
      #    7-H: gRPC Echo ingress
      #    7-I: hot-reload (touch config → watcher fires → routing refreshed)
      #    7-J: token rotate — new token works
      #
      #  Uses different ports (QUIC :10087, listener :8180, metrics :9091) and a
      #  separate SQLite DB to keep standalone state isolated from the ctld run.
      #  The backend servers (echo :9999, ws :8765, grpc :50051) are reused —
      #  they are still running from the earlier startup step.
      # ═══════════════════════════════════════════════════════════════════════════

      - name: "[Standalone] Stop ctld-mode tunnel (keep backends)"
        run: |
          kill "$(cat /tmp/client.pid 2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/server.pid 2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/ctld.pid   2>/dev/null)" 2>/dev/null || true
          sleep 0.5

      - name: "[Standalone] 7-A: start server — verify SQLite auto-seed on first boot"
        timeout-minutes: 1
        run: |
          mkdir -p data
          ./target/release/server --config ci-helpers/server-standalone.yaml \
            > /tmp/sa-server.log 2>&1 &
          echo $! > /tmp/sa-server.pid
          for i in $(seq 1 60); do
            if ! kill -0 "$(cat /tmp/sa-server.pid)" 2>/dev/null; then
              break
            fi
            curl -sf --max-time 1 http://127.0.0.1:9091/healthz > /dev/null 2>&1 && break
            sleep 0.5
          done
          if ! kill -0 "$(cat /tmp/sa-server.pid)" 2>/dev/null; then
            echo "ERROR: standalone server did not start"; cat /tmp/sa-server.log; exit 1
          fi
          if ! curl -sf --max-time 2 http://127.0.0.1:9091/healthz > /dev/null 2>&1; then
            echo "ERROR: standalone server healthz not ready"
            cat /tmp/sa-server.log; exit 1
          fi
          echo "Standalone server ready"

      - name: "[Standalone] 7-B: server token create CLI"
        run: |
          SA_TOKEN=$(./target/release/server --config ci-helpers/server-standalone.yaml \
            token create --name ci-standalone 2>/dev/null | tail -1)
          if [ -z "$SA_TOKEN" ]; then
            echo "ERROR: token create returned empty output"; exit 1
          fi
          echo "$SA_TOKEN" > /tmp/sa-token.txt
          echo "Token created: $SA_TOKEN"

      - name: "[Standalone] 7-C: client connects with standalone-issued token"
        timeout-minutes: 1
        run: |
          SA_TOKEN=$(cat /tmp/sa-token.txt)
          python3 -c "
          import re, sys
          f = 'ci-helpers/client.yaml'
          c = open(f).read()
          c = re.sub(r'^auth_token:.*', 'auth_token: \"' + sys.argv[1] + '\"', c, flags=re.MULTILINE)
          c = re.sub(r'^server_port:.*', 'server_port: 10087', c, flags=re.MULTILINE)
          open(f, 'w').write(c)
          " "$SA_TOKEN"
          ./target/release/client --config ci-helpers/client.yaml > /tmp/sa-client.log 2>&1 &
          echo $! > /tmp/sa-client.pid
          for i in $(seq 1 60); do
            if ! kill -0 "$(cat /tmp/sa-client.pid)" 2>/dev/null; then
              break
            fi
            curl -sf --max-time 1 http://127.0.0.1:9092/healthz > /dev/null 2>&1 && break
            sleep 0.5
          done
          if ! kill -0 "$(cat /tmp/sa-client.pid)" 2>/dev/null; then
            echo "ERROR: client did not login to standalone server"
            echo "=== server ===" && cat /tmp/sa-server.log
            echo "=== client ===" && cat /tmp/sa-client.log
            exit 1
          fi
          if ! curl -sf --max-time 2 http://127.0.0.1:9092/healthz > /dev/null 2>&1; then
            echo "ERROR: standalone client healthz not ready"
            echo "=== server ===" && cat /tmp/sa-server.log
            echo "=== client ===" && cat /tmp/sa-client.log
            exit 1
          fi
          # Warmup: wait for QUIC streams to be ready before 7-D fires.
          for i in $(seq 1 10); do
            curl -sf --max-time 3 http://echo.local:8180/ > /dev/null 2>&1 && break
            sleep 0.5
          done
          echo "Client connected to standalone server"

      - name: "[Standalone] 7-D: HTTP GET ingress — echo.local:8180"
        run: |
          ./target/release/ci-test-client http "http://echo.local:8180/"

      - name: "[Standalone] 7-E: HTTP POST + body verify ingress"
        run: |
          ./target/release/ci-test-client http "http://echo.local:8180/" \
            --method POST \
            --body '{"standalone":"ci","test":"sa-post-body"}' \
            --expect-body "sa-post-body"

      - name: "[Standalone] 7-F: WebSocket ingress — ws.local:8180"
        run: |
          ./target/release/ci-test-client ws "ws://ws.local:8180" --message "standalone-ws-hello"

      - name: "[Standalone] 7-G: gRPC Health ingress — grpc.local:8180"
        run: |
          ./target/release/ci-test-client grpc "grpc.local:8180" --service ""

      - name: "[Standalone] 7-H: gRPC Echo ingress — grpc.local:8180"
        run: |
          ./target/release/ci-test-client grpc-echo "grpc.local:8180" \
            --ping "standalone-grpc-echo"

      - name: "[Standalone] 7-I: hot-reload — touch config, verify watcher fires"
        run: |
          echo "# ci-hot-reload-trigger" >> ci-helpers/server-standalone.yaml
          sleep 2
          if ! kill -0 "$(cat /tmp/sa-server.pid)" 2>/dev/null; then
            echo "ERROR: standalone server exited after config touch"
            cat /tmp/sa-server.log; exit 1
          fi
          echo "Hot-reload confirmed"
          ./target/release/ci-test-client http "http://echo.local:8180/"

      - name: "[Standalone] 7-J: token rotate — new token works"
        run: |
          NEW_TOKEN=$(./target/release/server --config ci-helpers/server-standalone.yaml \
            token rotate --name ci-standalone 2>/dev/null | tail -1)
          if [ -z "$NEW_TOKEN" ]; then
            echo "ERROR: token rotate returned empty output"; exit 1
          fi
          echo "New token after rotate: $NEW_TOKEN"
          # Count server registrations before kill so we can detect unregistration.
          REG_BEFORE=$(grep -c "unregistering client" /tmp/sa-server.log 2>/dev/null || true)
          REG_BEFORE=${REG_BEFORE:-0}
          kill "$(cat /tmp/sa-client.pid 2>/dev/null)" 2>/dev/null || true
          for i in $(seq 1 15); do
            REG_NOW=$(grep -c "unregistering client" /tmp/sa-server.log 2>/dev/null || true)
            REG_NOW=${REG_NOW:-0}
            [ "$REG_NOW" -gt "$REG_BEFORE" ] && break
            sleep 0.5
          done
          python3 -c "
          import re, sys
          f = 'ci-helpers/client.yaml'
          c = open(f).read()
          c = re.sub(r'^auth_token:.*', 'auth_token: \"' + sys.argv[1] + '\"', c, flags=re.MULTILINE)
          open(f, 'w').write(c)
          " "$NEW_TOKEN"
          ./target/release/client --config ci-helpers/client.yaml > /tmp/sa-client2.log 2>&1 &
          echo $! > /tmp/sa-client.pid
          for i in $(seq 1 60); do
            if ! kill -0 "$(cat /tmp/sa-client.pid)" 2>/dev/null; then
              break
            fi
            curl -sf --max-time 1 http://127.0.0.1:9092/healthz > /dev/null 2>&1 && break
            sleep 0.5
          done
          if ! kill -0 "$(cat /tmp/sa-client.pid)" 2>/dev/null; then
            echo "ERROR: client did not reconnect after token rotate"
            echo "=== server ===" && tail -30 /tmp/sa-server.log
            echo "=== client ===" && cat /tmp/sa-client2.log
            exit 1
          fi
          if ! curl -sf --max-time 2 http://127.0.0.1:9092/healthz > /dev/null 2>&1; then
            echo "ERROR: standalone client healthz not ready after token rotate"
            echo "=== server ===" && tail -30 /tmp/sa-server.log
            echo "=== client ===" && cat /tmp/sa-client2.log
            exit 1
          fi
          # Warmup: wait for QUIC streams to be ready for traffic.
          for i in $(seq 1 10); do
            curl -sf --max-time 3 http://echo.local:8180/ > /dev/null 2>&1 && break
            sleep 0.5
          done
          ./target/release/ci-test-client http "http://echo.local:8180/"
          echo "Token rotate + reconnect OK"

      # ─── Diagnostics ─────────────────────────────────────────────────────────
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-logs-${{ github.run_id }}
          retention-days: 3
          path: |
            /tmp/ci-ctld.log
            /tmp/ci-server.log
            /tmp/ci-client.log
            /tmp/sa-server.log
            /tmp/sa-client.log
            /tmp/sa-client2.log
            /tmp/http-echo.log
            /tmp/ws-echo.log
            /tmp/grpc-echo.log

      - name: Cleanup
        if: always()
        run: |
          kill "$(cat /tmp/ctld.pid       2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/server.pid     2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/client.pid     2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/sa-server.pid  2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/sa-client.pid  2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/http-echo.pid  2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/ws-echo.pid    2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/grpc-echo.pid  2>/dev/null)" 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Stress test — k6 multi-protocol benchmark (local backends only)
  #
  # Runs in PARALLEL with integration-test.
  # Uses constant-arrival-rate executor (fixed QPS, accurate latency).
  #
  # Scenarios (all via local echo backends):
  #   HTTP ingress GET/POST    — echo.local:8080 → QUIC → client → echo:9999
  #   HTTP egress  GET/POST    — 127.0.0.1:8082  → QUIC → server → echo:9999
  #   WebSocket ingress        — ws.local:8080   → QUIC → client → ws-echo:8765
  #   gRPC Health + Echo       — grpc.local:8080 → QUIC → client → grpc:50051
  #   Bidirectional            — ingress + egress simultaneously
  #
  # Thresholds: p99 < 500ms, error rate < 5%  (fail CI if exceeded)
  # Resource usage (CPU/RSS) sampled before + after via /proc
  # ─────────────────────────────────────────────────────────────────────────────
  stress-test:
    name: Stress Test (k6 multi-protocol)
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && needs.build.result == 'success' && (github.event_name != 'workflow_dispatch' || inputs.run_stress != false)
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          name: release-bins-${{ github.run_id }}
          path: target/release

      - name: Mark binaries executable
        run: chmod +x target/release/server target/release/client target/release/tunnel-ctld target/release/http-echo-server target/release/ws-echo-server target/release/grpc-echo-server

      - uses: grafana/setup-k6-action@98db1bcacc2d06234a3cade8629ebc97e0130ec2 # v1

      - name: Install sysstat
        run: sudo apt-get install -y -qq sysstat

      - name: Tune kernel parameters
        if: ${{ inputs.tune_kernel != 'false' }}
        run: sudo bash scripts/tune-os.sh

      - name: Configure /etc/hosts
        run: |
          sudo tee -a /etc/hosts << 'EOF'
          127.0.0.1  echo.local
          127.0.0.1  ws.local
          127.0.0.1  grpc.local
          127.0.0.1  echo-01.local
          127.0.0.1  echo-02.local
          127.0.0.1  echo-03.local
          127.0.0.1  echo-04.local
          127.0.0.1  echo-05.local
          127.0.0.1  echo-06.local
          127.0.0.1  echo-07.local
          127.0.0.1  echo-08.local
          127.0.0.1  echo-09.local
          127.0.0.1  echo-10.local
          127.0.0.1  echo-11.local
          127.0.0.1  echo-12.local
          127.0.0.1  echo-13.local
          127.0.0.1  echo-14.local
          127.0.0.1  echo-15.local
          127.0.0.1  echo-16.local
          127.0.0.1  echo-17.local
          127.0.0.1  echo-18.local
          127.0.0.1  echo-19.local
          127.0.0.1  echo-20.local
          127.0.0.1  echo-21.local
          127.0.0.1  echo-22.local
          127.0.0.1  echo-23.local
          127.0.0.1  echo-24.local
          127.0.0.1  echo-25.local
          127.0.0.1  echo-26.local
          127.0.0.1  echo-27.local
          127.0.0.1  echo-28.local
          127.0.0.1  echo-29.local
          127.0.0.1  echo-30.local
          127.0.0.1  echo-31.local
          127.0.0.1  echo-32.local
          127.0.0.1  echo-33.local
          127.0.0.1  echo-34.local
          127.0.0.1  echo-35.local
          127.0.0.1  echo-36.local
          127.0.0.1  echo-37.local
          127.0.0.1  echo-38.local
          127.0.0.1  echo-39.local
          127.0.0.1  echo-40.local
          127.0.0.1  echo-41.local
          127.0.0.1  echo-42.local
          127.0.0.1  echo-43.local
          127.0.0.1  echo-44.local
          127.0.0.1  echo-45.local
          127.0.0.1  echo-46.local
          127.0.0.1  echo-47.local
          127.0.0.1  echo-48.local
          127.0.0.1  echo-49.local
          127.0.0.1  echo-50.local
          EOF

      - name: Start all backends + tunnel (ctld → server → client)
        timeout-minutes: 2
        run: |
          CLIENT_QUIC_CONNECTIONS="${{ github.event_name == 'workflow_dispatch' && inputs.stress_quic_connections || '4' }}"
          case "$CLIENT_QUIC_CONNECTIONS" in
            ''|*[!0-9]*)
              echo "ERROR: stress_quic_connections must be a positive integer, got: $CLIENT_QUIC_CONNECTIONS"
              exit 1
              ;;
          esac
          if [ "$CLIENT_QUIC_CONNECTIONS" -lt 1 ]; then
            echo "ERROR: stress_quic_connections must be >= 1, got: $CLIENT_QUIC_CONNECTIONS"
            exit 1
          fi

          ./target/release/http-echo-server 9999  > /tmp/http-echo.log  2>&1 & echo $! > /tmp/http-echo.pid
          ./target/release/ws-echo-server   8765  > /tmp/ws-echo.log    2>&1 & echo $! > /tmp/ws-echo.pid
          ./target/release/grpc-echo-server 50051 > /tmp/grpc-echo.log  2>&1 & echo $! > /tmp/grpc-echo.pid
          for i in $(seq 1 20); do
            curl -sf --max-time 2 http://127.0.0.1:9999/ > /dev/null && break
            sleep 0.2
          done
          sleep 0.5

          mkdir -p data
          ./target/release/tunnel-ctld --config ci-helpers/ctld.yaml > /tmp/ci-ctld.log 2>&1 &
          echo $! > /tmp/ctld.pid
          for i in $(seq 1 60); do
            curl -sf --max-time 1 http://127.0.0.1:9091/healthz > /dev/null 2>&1 && break
            sleep 0.5
          done
          curl -sf --max-time 2 http://127.0.0.1:9091/healthz > /dev/null 2>&1 \
            || { echo "ERROR: ctld healthz never became ready"; cat /tmp/ci-ctld.log; exit 1; }

          ./target/release/server --config ci-helpers/server.yaml \
            --ctld-addr 127.0.0.1:7788 > /tmp/ci-server.log 2>&1 &
          echo $! > /tmp/server.pid
          for i in $(seq 1 60); do
            curl -sf --max-time 1 http://127.0.0.1:9090/healthz > /dev/null 2>&1 && break
            sleep 0.5
          done
          curl -sf --max-time 2 http://127.0.0.1:9090/healthz > /dev/null 2>&1 \
            || { echo "ERROR: server healthz never became ready"; cat /tmp/ci-server.log; exit 1; }

          TOKEN=$(./target/release/tunnel-ctld --config ci-helpers/ctld.yaml \
            client create-client ci-group 2>/dev/null | grep '^Token:' | awk '{print $2}' \
            || ./target/release/tunnel-ctld --config ci-helpers/ctld.yaml \
            client rotate-token ci-group 2>/dev/null | awk '{print $NF}')
          if [ -z "$TOKEN" ]; then echo "ERROR: failed to obtain token"; exit 1; fi
          python3 -c "import re,sys; f='ci-helpers/client.yaml'; t=sys.argv[1]; n=sys.argv[2]; c=open(f).read(); c=re.sub(r'^auth_token:.*','auth_token: \"'+t+'\"',c,flags=re.MULTILINE); c=re.sub(r'^(\\s*connections:)\\s*\\d+', r'\\1 '+n, c, flags=re.MULTILINE); open(f,'w').write(c)" "$TOKEN" "$CLIENT_QUIC_CONNECTIONS"
          # Wait for ctld poll to push new token to server (~1500ms poll interval)
          sleep 3
          ./target/release/client --config ci-helpers/client.yaml > /tmp/ci-client.log 2>&1 &
          echo $! > /tmp/client.pid
          for i in $(seq 1 60); do
            if ! kill -0 "$(cat /tmp/client.pid)" 2>/dev/null; then
              break
            fi
            curl -sf --max-time 1 http://127.0.0.1:9092/healthz > /dev/null 2>&1 && break
            sleep 0.5
          done
          if ! kill -0 "$(cat /tmp/client.pid)" 2>/dev/null; then
            echo "ERROR: client did not login"
            cat /tmp/ci-ctld.log; cat /tmp/ci-server.log; cat /tmp/ci-client.log
            exit 1
          fi
          if ! curl -sf --max-time 2 http://127.0.0.1:9092/healthz > /dev/null 2>&1; then
            echo "ERROR: client healthz not ready"
            cat /tmp/ci-ctld.log; cat /tmp/ci-server.log; cat /tmp/ci-client.log
            exit 1
          fi
          echo "All backends + tunnel ready"

      - name: Warmup — verify tunnel is serving
        timeout-minutes: 2
        run: |
          warmup_probe() {
            echo "Probing ingress (echo.local:8080)..."
            for i in $(seq 1 10); do
              if curl -sf --max-time 3 http://echo.local:8080/ > /dev/null 2>&1; then
                echo "  ingress OK after probe $i"
                break
              fi
              sleep 0.5
            done
            echo "Probing egress (127.0.0.1:8082)..."
            for i in $(seq 1 10); do
              if curl -sf --max-time 3 -H "Host: echo.local" http://127.0.0.1:8082/ > /dev/null 2>&1; then
                echo "  egress OK after probe $i"
                break
              fi
              sleep 0.5
            done
            curl -sf --max-time 5 http://echo.local:8080/ > /dev/null && \
            curl -sf --max-time 5 -H "Host: echo.local" http://127.0.0.1:8082/ > /dev/null
          }

          if warmup_probe; then
            echo "Tunnel warm and serving"
            exit 0
          fi

          echo "WARNING: warmup failed, restarting client then server..."
          echo "=== client log ===" && tail -30 /tmp/ci-client.log || true
          echo "=== server log ===" && tail -30 /tmp/ci-server.log || true

          kill "$(cat /tmp/client.pid 2>/dev/null)" 2>/dev/null || true
          sleep 0.5
          kill "$(cat /tmp/server.pid 2>/dev/null)" 2>/dev/null || true
          sleep 0.5

          echo "Restarting server..."
          ./target/release/server --config ci-helpers/server.yaml \
            --ctld-addr 127.0.0.1:7788 > /tmp/ci-server.log 2>&1 &
          echo $! > /tmp/server.pid
          for i in $(seq 1 60); do
            curl -sf --max-time 1 http://127.0.0.1:9090/healthz > /dev/null 2>&1 && break
            sleep 0.5
          done

          echo "Restarting client..."
          ./target/release/client --config ci-helpers/client.yaml > /tmp/ci-client.log 2>&1 &
          echo $! > /tmp/client.pid
          for i in $(seq 1 60); do
            if ! kill -0 "$(cat /tmp/client.pid)" 2>/dev/null; then
              break
            fi
            curl -sf --max-time 1 http://127.0.0.1:9092/healthz > /dev/null 2>&1 && break
            sleep 0.5
          done
          if ! kill -0 "$(cat /tmp/client.pid)" 2>/dev/null; then
            echo "ERROR: client did not login after restart"
            cat /tmp/ci-ctld.log; cat /tmp/ci-server.log; cat /tmp/ci-client.log
            exit 1
          fi
          if ! curl -sf --max-time 2 http://127.0.0.1:9092/healthz > /dev/null 2>&1; then
            echo "ERROR: client healthz not ready after restart"
            cat /tmp/ci-ctld.log; cat /tmp/ci-server.log; cat /tmp/ci-client.log
            exit 1
          fi
          echo "Retrying warmup after restart..."
          if warmup_probe; then
            echo "Tunnel warm and serving (after restart)"
            exit 0
          fi

          echo "FAIL: tunnel not serving after restart"
          echo "=== client log ===" && cat /tmp/ci-client.log
          echo "=== server log ===" && cat /tmp/ci-server.log
          exit 1

      - name: Metrics — before benchmark
        run: |
          echo "── Server metrics before k6 ──"
          curl -sf http://127.0.0.1:9090/metrics || echo "(metrics endpoint not available)"

      - name: Collect machine info
        run: |
          echo "$(nproc) $(grep MemTotal /proc/meminfo | awk '{print $2}')" > /tmp/machine-info

      - name: Start resource sampling
        run: |
          DO_CPU="${{ github.event_name != 'workflow_dispatch' || inputs.monitor_cpu != false }}"
          DO_IO="${{ github.event_name != 'workflow_dispatch' || inputs.monitor_io != false }}"
          DO_CTXSW="${{ github.event_name != 'workflow_dispatch' || inputs.monitor_ctxsw != false }}"
          DO_NET="${{ github.event_name != 'workflow_dispatch' || inputs.monitor_net != false }}"
          DO_TCP="${{ github.event_name != 'workflow_dispatch' || inputs.monitor_tcp != false }}"
          DO_PSI="${{ github.event_name != 'workflow_dispatch' || inputs.monitor_psi != false }}"
          DO_PAGING="${{ github.event_name != 'workflow_dispatch' || inputs.monitor_paging != false }}"

          if [ "$DO_CPU" = "true" ]; then
            mpstat 2 > /tmp/mpstat.log 2>&1 &
            echo $! > /tmp/mpstat.pid
            (
              echo "CLK_TCK=$(getconf CLK_TCK)"
              while true; do
                TS=$(date +%s.%N)
                for d in /proc/[0-9]*/; do
                  pid=${d#/proc/}; pid=${pid%/}
                  read -r stat < "/proc/$pid/stat" 2>/dev/null || continue
                  comm=$(echo "$stat" | sed 's/.*(\(.*\)).*/\1/')
                  utime=$(echo "$stat" | awk '{print $14}')
                  stime=$(echo "$stat" | awk '{print $15}')
                  rss=$(awk '/^VmRSS:/{print $2}' "/proc/$pid/status" 2>/dev/null) || continue
                  echo "$TS $pid $comm $utime $stime ${rss:-0}"
                done
                echo "---"
                sleep 2
              done
            ) > /tmp/proc-cpu.log 2>&1 &
            echo $! > /tmp/proc-cpu.pid
          fi

          if [ "$DO_IO" = "true" ]; then
            pidstat -p ALL -d 2 > /tmp/pidstat-io.log 2>&1 &
            echo $! > /tmp/pidstat-io.pid
          fi

          if [ "$DO_CTXSW" = "true" ]; then
            pidstat -p ALL -w 2 > /tmp/pidstat-ctxsw.log 2>&1 &
            echo $! > /tmp/pidstat-ctxsw.pid
          fi

          if [ "$DO_NET" = "true" ]; then
            sar -n DEV 2 > /tmp/sar-net.log 2>&1 &
            echo $! > /tmp/sar-net.pid
          fi

          if [ "$DO_PAGING" = "true" ]; then
            sar -B 2 > /tmp/sar-paging.log 2>&1 &
            echo $! > /tmp/sar-paging.pid
          fi

          if [ "$DO_TCP" = "true" ]; then
            (while true; do
              echo "$(date +%s) $(ss -s 2>/dev/null | grep -E 'estab|timewait|closed' | tr '\n' '|')"
              sleep 2
            done) > /tmp/ss-timeseries.log 2>&1 &
            echo $! > /tmp/ss-loop.pid
          fi

          if [ "$DO_PSI" = "true" ] && [ -f /proc/pressure/cpu ]; then
            (while true; do
              TS=$(date +%s)
              CPU=$(awk '/^full/{for(i=1;i<=NF;i++)if($i~/^avg10=/)print substr($i,7)}' /proc/pressure/cpu 2>/dev/null)
              MEM=$(awk '/^full/{for(i=1;i<=NF;i++)if($i~/^avg10=/)print substr($i,7)}' /proc/pressure/memory 2>/dev/null)
              IO=$(awk '/^full/{for(i=1;i<=NF;i++)if($i~/^avg10=/)print substr($i,7)}' /proc/pressure/io 2>/dev/null)
              echo "$TS cpu=$CPU mem=$MEM io=$IO"
              sleep 2
            done) > /tmp/psi-timeseries.log 2>&1 &
            echo $! > /tmp/psi-loop.pid
          else
            echo "PSI not available" > /tmp/psi-timeseries.log
          fi

          nproc > /tmp/nproc
          date +%s > /tmp/sampling_start_epoch
          echo "Sampling: cpu=$DO_CPU io=$DO_IO ctxsw=$DO_CTXSW net=$DO_NET tcp=$DO_TCP psi=$DO_PSI paging=$DO_PAGING"

      - name: Install frp
        if: github.event_name != 'workflow_dispatch' || inputs.run_frp != false
        run: |
          FRP_VER=0.61.0
          wget -q "https://github.com/fatedier/frp/releases/download/v${FRP_VER}/frp_${FRP_VER}_linux_amd64.tar.gz" -O /tmp/frp.tar.gz
          tar -xzf /tmp/frp.tar.gz -C /tmp
          sudo cp "/tmp/frp_${FRP_VER}_linux_amd64/frps" /usr/local/bin/frps
          sudo cp "/tmp/frp_${FRP_VER}_linux_amd64/frpc" /usr/local/bin/frpc

      - name: Start frp and run frp benchmark
        if: github.event_name != 'workflow_dispatch' || inputs.run_frp != false
        run: |
          frps -c ci-helpers/frps.toml > /tmp/frps.log 2>&1 &
          echo $! > /tmp/frps.pid
          sleep 1
          frpc -c ci-helpers/frpc.toml > /tmp/frpc.log 2>&1 &
          echo $! > /tmp/frpc.pid
          FRP_READY=0
          for i in $(seq 1 20); do
            curl -sf --max-time 2 -H "Host: echo.local" http://127.0.0.1:18090/ > /dev/null 2>&1 && FRP_READY=1 && break
            sleep 0.5
          done
          if [ "$FRP_READY" -eq 0 ]; then
            echo "WARNING: frp did not become ready, skipping benchmark"
            echo "=== frps ===" && cat /tmp/frps.log || true
            echo "=== frpc ===" && cat /tmp/frpc.log || true
            exit 0
          fi
          echo "frp ready, running benchmark..."
          date +%s > /tmp/frp_k6_start_epoch
          cd ci-helpers/k6
          k6 run -e GITHUB_SHA=${{ github.sha }} bench-frp.js || true

      - name: Stop frp
        if: always() && (github.event_name != 'workflow_dispatch' || inputs.run_frp != false)
        run: |
          kill -9 "$(cat /tmp/frps.pid 2>/dev/null)" 2>/dev/null || true
          kill -9 "$(cat /tmp/frpc.pid 2>/dev/null)" 2>/dev/null || true

      - name: Run k6 stress test
        working-directory: ci-helpers/k6
        run: |
          date +%s > /tmp/k6_start_epoch
          k6 run -e GITHUB_SHA=${{ github.sha }} -e BENCH_PROFILE=core bench.js &
          echo $! > /tmp/k6.pid
          wait "$(cat /tmp/k6.pid)"

      - name: Stop duotunnel server and client
        if: always()
        run: |
          SERVER_PID="$(cat /tmp/server.pid 2>/dev/null || true)"
          if [ -n "$SERVER_PID" ]; then
            kill -TERM "$SERVER_PID" 2>/dev/null || true
            for i in $(seq 1 20); do
              kill -0 "$SERVER_PID" 2>/dev/null || break
              sleep 0.5
            done
            kill -9 "$SERVER_PID" 2>/dev/null || true
          fi
          CLIENT_PID="$(cat /tmp/client.pid 2>/dev/null || true)"
          if [ -n "$CLIENT_PID" ]; then
            kill -TERM "$CLIENT_PID" 2>/dev/null || true
            for i in $(seq 1 20); do
              kill -0 "$CLIENT_PID" 2>/dev/null || break
              sleep 0.5
            done
            kill -9 "$CLIENT_PID" 2>/dev/null || true
          fi

      - name: Stop resource sampling
        if: always()
        run: |
          kill -9 "$(cat /tmp/mpstat.pid 2>/dev/null)" 2>/dev/null || true
          kill -9 "$(cat /tmp/proc-cpu.pid 2>/dev/null)" 2>/dev/null || true
          kill -9 "$(cat /tmp/pidstat-io.pid 2>/dev/null)" 2>/dev/null || true
          kill -9 "$(cat /tmp/pidstat-ctxsw.pid 2>/dev/null)" 2>/dev/null || true
          kill -9 "$(cat /tmp/vmstat.pid 2>/dev/null)" 2>/dev/null || true
          kill -9 "$(cat /tmp/sar-net.pid 2>/dev/null)" 2>/dev/null || true
          kill -9 "$(cat /tmp/sar-paging.pid 2>/dev/null)" 2>/dev/null || true
          kill -9 "$(cat /tmp/ss-loop.pid 2>/dev/null)" 2>/dev/null || true
          kill -9 "$(cat /tmp/psi-loop.pid 2>/dev/null)" 2>/dev/null || true
          pkill -9 -f "mpstat" 2>/dev/null || true
          pkill -9 -f "pidstat" 2>/dev/null || true
          pkill -9 -f "sar -n" 2>/dev/null || true
          pkill -9 -f "sar -B" 2>/dev/null || true
          sleep 0.5

      - name: Resource report — CPU (mpstat)
        if: always()
        run: |
          echo "── CPU utilization during k6 (mpstat 2s interval) ──"
          cat /tmp/mpstat.log || echo "(no data)"

      - name: Resource report — per-process (pidstat)
        if: always()
        run: |
          echo "── I/O stats per process (pidstat -d) ──"
          cat /tmp/pidstat-io.log || echo "(no data)"
          echo "── Context switches per process (pidstat -w) ──"
          cat /tmp/pidstat-ctxsw.log || echo "(no data)"

      - name: Resource report — system (vmstat)
        if: always()
        run: |
          echo "── System overview during k6 (vmstat 2s interval) ──"
          cat /tmp/vmstat.log || echo "(no data)"

      - name: Metrics — after benchmark
        if: always()
        run: |
          echo "── Server metrics after k6 ──"
          curl -sf http://127.0.0.1:9090/metrics || echo "(metrics endpoint not available)"

      - name: Parse resource data
        if: always()
        run: |
          K6_OFFSET=0
          if [ -f /tmp/sampling_start_epoch ] && [ -f /tmp/k6_start_epoch ]; then
            S=$(cat /tmp/sampling_start_epoch)
            K=$(cat /tmp/k6_start_epoch)
            K6_OFFSET=$(( K - S ))
          fi
          python3 "${{ github.workspace }}/ci-helpers/parse-resources.py" \
            --proc-cpu     /tmp/proc-cpu.log \
            --mpstat       /tmp/mpstat.log \
            --pidstat-io   /tmp/pidstat-io.log \
            --pidstat-ctxsw /tmp/pidstat-ctxsw.log \
            --sar-net      /tmp/sar-net.log \
            --sar-paging   /tmp/sar-paging.log \
            --ss           /tmp/ss-timeseries.log \
            --psi          /tmp/psi-timeseries.log \
            --k6-offset    "$K6_OFFSET" \
            --nproc        /tmp/nproc \
            --machine-info /tmp/machine-info \
            --output       /tmp/resource-data.json \
            || echo "Resource parsing failed (non-fatal)"

      - name: Upload benchmark outputs (core)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stress-core-results-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: warn
          path: |
            /tmp/bench-results.json
            /tmp/bench-results-frp.json
            /tmp/resource-data.json
            /tmp/sampling_start_epoch
            /tmp/frp_k6_start_epoch

      - name: Dump tunnel error logs
        if: always()
        run: |
          echo "=== server errors ===" && grep -iE 'error|warn|panic' /tmp/ci-server.log | tail -50 || true
          echo "=== client errors ===" && grep -iE 'error|warn|panic' /tmp/ci-client.log | tail -50 || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stress-test-logs-${{ github.run_id }}
          retention-days: 7
          path: |
            /tmp/ci-server.log
            /tmp/ci-client.log
            /tmp/http-echo.log
            /tmp/frps.log
            /tmp/frpc.log

      - name: Cleanup
        if: always()
        run: |
          kill "$(cat /tmp/server.pid    2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/client.pid    2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/http-echo.pid 2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/ws-echo.pid   2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/grpc-echo.pid 2>/dev/null)" 2>/dev/null || true

  stress-trace-8k:
    name: Stress Trace 8K (dial9)
    runs-on: ubuntu-latest
    needs: [build, build-dial9]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped') && (needs.build-dial9.result == 'success' || needs.build-dial9.result == 'skipped') && (github.event_name != 'workflow_dispatch' || inputs.run_stress_trace != false)
    permissions:
      contents: read
    outputs:
      trace_artifact_ingress_8000qps_server_url: ${{ steps.upload-trace-ingress-8000qps-server.outputs.artifact-url }}
      trace_artifact_ingress_8000qps_client_url: ${{ steps.upload-trace-ingress-8000qps-client.outputs.artifact-url }}
      trace_artifact_egress_8000qps_server_url: ${{ steps.upload-trace-egress-8000qps-server.outputs.artifact-url }}
      trace_artifact_egress_8000qps_client_url: ${{ steps.upload-trace-egress-8000qps-client.outputs.artifact-url }}
      trace_artifact_ingress_multihost_8000qps_server_url: ${{ steps.upload-trace-ingress-multihost-8000qps-server.outputs.artifact-url }}
      trace_artifact_ingress_multihost_8000qps_client_url: ${{ steps.upload-trace-ingress-multihost-8000qps-client.outputs.artifact-url }}
      trace_artifact_egress_multihost_8000qps_server_url: ${{ steps.upload-trace-egress-multihost-8000qps-server.outputs.artifact-url }}
      trace_artifact_egress_multihost_8000qps_client_url: ${{ steps.upload-trace-egress-multihost-8000qps-client.outputs.artifact-url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download dial9 binaries
        if: github.event_name != 'workflow_dispatch' || inputs.build_profile == 'dial9' || inputs.build_profile == 'both'
        uses: actions/download-artifact@v4
        with:
          name: release-bins-dial9-${{ github.run_id }}
          path: target/release

      - name: Download release binaries
        if: github.event_name == 'workflow_dispatch' && inputs.build_profile == 'release'
        uses: actions/download-artifact@v4
        with:
          name: release-bins-${{ github.run_id }}
          path: target/release

      - name: Mark binaries executable
        run: chmod +x target/release/server target/release/client target/release/tunnel-ctld target/release/http-echo-server target/release/ws-echo-server target/release/grpc-echo-server

      - uses: grafana/setup-k6-action@98db1bcacc2d06234a3cade8629ebc97e0130ec2 # v1

      - name: Enable perf events for tokio telemetry
        run: |
          echo -1 | sudo tee /proc/sys/kernel/perf_event_paranoid || \
            sudo sysctl -w kernel.perf_event_paranoid=-1 || true
          echo 0 | sudo tee /proc/sys/kernel/kptr_restrict || \
            sudo sysctl -w kernel.kptr_restrict=0 || true

      - name: Tune kernel parameters
        if: ${{ inputs.tune_kernel != 'false' }}
        run: sudo bash scripts/tune-os.sh

      - name: Configure /etc/hosts
        run: |
          sudo tee -a /etc/hosts << 'EOF'
          127.0.0.1  echo.local
          127.0.0.1  ws.local
          127.0.0.1  grpc.local
          127.0.0.1  echo-01.local
          127.0.0.1  echo-02.local
          127.0.0.1  echo-03.local
          127.0.0.1  echo-04.local
          127.0.0.1  echo-05.local
          127.0.0.1  echo-06.local
          127.0.0.1  echo-07.local
          127.0.0.1  echo-08.local
          127.0.0.1  echo-09.local
          127.0.0.1  echo-10.local
          127.0.0.1  echo-11.local
          127.0.0.1  echo-12.local
          127.0.0.1  echo-13.local
          127.0.0.1  echo-14.local
          127.0.0.1  echo-15.local
          127.0.0.1  echo-16.local
          127.0.0.1  echo-17.local
          127.0.0.1  echo-18.local
          127.0.0.1  echo-19.local
          127.0.0.1  echo-20.local
          127.0.0.1  echo-21.local
          127.0.0.1  echo-22.local
          127.0.0.1  echo-23.local
          127.0.0.1  echo-24.local
          127.0.0.1  echo-25.local
          127.0.0.1  echo-26.local
          127.0.0.1  echo-27.local
          127.0.0.1  echo-28.local
          127.0.0.1  echo-29.local
          127.0.0.1  echo-30.local
          127.0.0.1  echo-31.local
          127.0.0.1  echo-32.local
          127.0.0.1  echo-33.local
          127.0.0.1  echo-34.local
          127.0.0.1  echo-35.local
          127.0.0.1  echo-36.local
          127.0.0.1  echo-37.local
          127.0.0.1  echo-38.local
          127.0.0.1  echo-39.local
          127.0.0.1  echo-40.local
          127.0.0.1  echo-41.local
          127.0.0.1  echo-42.local
          127.0.0.1  echo-43.local
          127.0.0.1  echo-44.local
          127.0.0.1  echo-45.local
          127.0.0.1  echo-46.local
          127.0.0.1  echo-47.local
          127.0.0.1  echo-48.local
          127.0.0.1  echo-49.local
          127.0.0.1  echo-50.local
          EOF

      - name: Run dial9 trace sequence
        timeout-minutes: 25
        run: |
          CLIENT_QUIC_CONNECTIONS="${{ github.event_name == 'workflow_dispatch' && inputs.stress_quic_connections || '4' }}"
          case "$CLIENT_QUIC_CONNECTIONS" in
            ''|*[!0-9]*)
              echo "ERROR: stress_quic_connections must be a positive integer, got: $CLIENT_QUIC_CONNECTIONS"
              exit 1
              ;;
          esac
          if [ "$CLIENT_QUIC_CONNECTIONS" -lt 1 ]; then
            echo "ERROR: stress_quic_connections must be >= 1, got: $CLIENT_QUIC_CONNECTIONS"
            exit 1
          fi

          run_case() {
            CASE_NAME="$1"
            SUFFIX="${CASE_NAME}"
            rm -f /tmp/bench-results.json /tmp/server-trace.*.bin /tmp/client-trace.*.bin /tmp/server-trace.*.bin.active /tmp/client-trace.*.bin.active /tmp/server-trace.*.bin.gz /tmp/client-trace.*.bin.gz
            ./target/release/http-echo-server 9999  > "/tmp/http-echo-${SUFFIX}.log"  2>&1 & echo $! > /tmp/http-echo.pid
            ./target/release/ws-echo-server   8765  > "/tmp/ws-echo-${SUFFIX}.log"    2>&1 & echo $! > /tmp/ws-echo.pid
            ./target/release/grpc-echo-server 50051 > "/tmp/grpc-echo-${SUFFIX}.log"  2>&1 & echo $! > /tmp/grpc-echo.pid
            for i in $(seq 1 30); do
              curl -sf --max-time 2 http://127.0.0.1:9999/ > /dev/null && break
              sleep 0.5
            done
            sleep 0.5

            rm -rf data
            mkdir -p data
            ./target/release/tunnel-ctld --config ci-helpers/ctld.yaml > "/tmp/ci-ctld-${SUFFIX}.log" 2>&1 &
            echo $! > /tmp/ctld.pid
            for i in $(seq 1 60); do
              curl -sf --max-time 1 http://127.0.0.1:9091/healthz > /dev/null 2>&1 && break
              sleep 0.5
            done
            curl -sf --max-time 2 http://127.0.0.1:9091/healthz > /dev/null 2>&1 \
              || { echo "ERROR: ctld healthz never became ready"; cat "/tmp/ci-ctld-${SUFFIX}.log"; exit 1; }

            WORKER_THREADS="${{ inputs.worker_threads }}"
            TOKIO_ENV=""
            if [ -n "$WORKER_THREADS" ] && [ "$WORKER_THREADS" != "0" ]; then
              TOKIO_ENV="TOKIO_WORKER_THREADS=${WORKER_THREADS}"
            fi

            env $TOKIO_ENV DIAL9_TRACE_PATH=/tmp/server-trace.bin \
              ./target/release/server --config ci-helpers/server.yaml \
              --ctld-addr 127.0.0.1:7788 > "/tmp/ci-server-${SUFFIX}.log" 2>&1 &
            echo $! > /tmp/server.pid
            for i in $(seq 1 60); do
              curl -sf --max-time 1 http://127.0.0.1:9090/healthz > /dev/null 2>&1 && break
              sleep 0.5
            done
            curl -sf --max-time 2 http://127.0.0.1:9090/healthz > /dev/null 2>&1 \
              || { echo "ERROR: server healthz never became ready"; cat "/tmp/ci-server-${SUFFIX}.log"; exit 1; }

            CLIENT_NAME="ci-group"
            TOKEN=$(./target/release/tunnel-ctld --config ci-helpers/ctld.yaml \
              client create-client "${CLIENT_NAME}" 2>/dev/null | awk '/^Token:/ {print $2; exit}')
            if [ -z "$TOKEN" ]; then
              TOKEN=$(./target/release/tunnel-ctld --config ci-helpers/ctld.yaml \
                client rotate-token "${CLIENT_NAME}" 2>/dev/null | awk '{print $NF}' | tail -n1)
            fi
            if [ -z "$TOKEN" ]; then echo "ERROR: failed to obtain token"; exit 1; fi
            python3 -c "import re,sys; f='ci-helpers/client.yaml'; t=sys.argv[1]; n=sys.argv[2]; c=open(f).read(); c=re.sub(r'^auth_token:.*','auth_token: \"'+t+'\"',c,flags=re.MULTILINE); c=re.sub(r'^(\\s*connections:)\\s*\\d+', r'\\1 '+n, c, flags=re.MULTILINE); open(f,'w').write(c)" "$TOKEN" "$CLIENT_QUIC_CONNECTIONS"
            sed -i 's/quic: false/quic: true/g; s/tokio: false/tokio: true/g' ci-helpers/server.yaml ci-helpers/client.yaml

            sleep 3

            env $TOKIO_ENV DIAL9_TRACE_PATH=/tmp/client-trace.bin \
              ./target/release/client --config ci-helpers/client.yaml > "/tmp/ci-client-${SUFFIX}.log" 2>&1 &
            echo $! > /tmp/client.pid
            for i in $(seq 1 60); do
              if ! kill -0 "$(cat /tmp/client.pid)" 2>/dev/null; then
                break
              fi
              curl -sf --max-time 1 http://127.0.0.1:9092/healthz > /dev/null 2>&1 && break
              sleep 0.5
            done
            if ! kill -0 "$(cat /tmp/client.pid)" 2>/dev/null; then
              echo "ERROR: client did not login"
              cat "/tmp/ci-ctld-${SUFFIX}.log"; cat "/tmp/ci-server-${SUFFIX}.log"; cat "/tmp/ci-client-${SUFFIX}.log"
              exit 1
            fi
            if ! curl -sf --max-time 2 http://127.0.0.1:9092/healthz > /dev/null 2>&1; then
              echo "ERROR: client healthz not ready"
              cat "/tmp/ci-ctld-${SUFFIX}.log"; cat "/tmp/ci-server-${SUFFIX}.log"; cat "/tmp/ci-client-${SUFFIX}.log"
              exit 1
            fi

            warmup_probe() {
              for i in $(seq 1 10); do
                if curl -sf --max-time 3 http://echo.local:8080/ > /dev/null 2>&1; then
                  break
                fi
                sleep 0.5
              done
              for i in $(seq 1 10); do
                if curl -sf --max-time 3 -H "Host: echo.local" http://127.0.0.1:8082/ > /dev/null 2>&1; then
                  break
                fi
                sleep 0.5
              done
              curl -sf --max-time 5 http://echo.local:8080/ > /dev/null && \
              curl -sf --max-time 5 -H "Host: echo.local" http://127.0.0.1:8082/ > /dev/null
            }

            if ! warmup_probe; then
              echo "WARNING: warmup failed, restarting client then server..."
              kill "$(cat /tmp/client.pid 2>/dev/null)" 2>/dev/null || true
              sleep 0.5
              kill "$(cat /tmp/server.pid 2>/dev/null)" 2>/dev/null || true
              sleep 0.5

              env $TOKIO_ENV DIAL9_TRACE_PATH=/tmp/server-trace.bin \
                ./target/release/server --config ci-helpers/server.yaml \
                --ctld-addr 127.0.0.1:7788 > "/tmp/ci-server-${SUFFIX}.log" 2>&1 &
              echo $! > /tmp/server.pid
              for i in $(seq 1 60); do
                curl -sf --max-time 1 http://127.0.0.1:9090/healthz > /dev/null 2>&1 && break
                sleep 0.5
              done
              if ! curl -sf --max-time 2 http://127.0.0.1:9090/healthz > /dev/null 2>&1; then
                echo "ERROR: server healthz not ready after restart"
                cat "/tmp/ci-ctld-${SUFFIX}.log"; cat "/tmp/ci-server-${SUFFIX}.log"; cat "/tmp/ci-client-${SUFFIX}.log"
                exit 1
              fi

              env $TOKIO_ENV DIAL9_TRACE_PATH=/tmp/client-trace.bin \
                ./target/release/client --config ci-helpers/client.yaml > "/tmp/ci-client-${SUFFIX}.log" 2>&1 &
              echo $! > /tmp/client.pid
              for i in $(seq 1 60); do
                if ! kill -0 "$(cat /tmp/client.pid)" 2>/dev/null; then
                  break
                fi
                curl -sf --max-time 1 http://127.0.0.1:9092/healthz > /dev/null 2>&1 && break
                sleep 0.5
              done
              if ! kill -0 "$(cat /tmp/client.pid)" 2>/dev/null; then
                echo "ERROR: client did not login after restart"
                cat "/tmp/ci-ctld-${SUFFIX}.log"; cat "/tmp/ci-server-${SUFFIX}.log"; cat "/tmp/ci-client-${SUFFIX}.log"
                exit 1
              fi
              if ! curl -sf --max-time 2 http://127.0.0.1:9092/healthz > /dev/null 2>&1; then
                echo "ERROR: client healthz not ready after restart"
                cat "/tmp/ci-ctld-${SUFFIX}.log"; cat "/tmp/ci-server-${SUFFIX}.log"; cat "/tmp/ci-client-${SUFFIX}.log"
                exit 1
              fi

              if ! warmup_probe; then
                echo "ERROR: warmup failed"
                cat "/tmp/ci-ctld-${SUFFIX}.log"; cat "/tmp/ci-server-${SUFFIX}.log"; cat "/tmp/ci-client-${SUFFIX}.log"
                exit 1
              fi
            fi

            (
              echo "CLK_TCK=$(getconf CLK_TCK)"
              while true; do
                TS=$(date +%s.%N)
                for d in /proc/[0-9]*/; do
                  pid=${d#/proc/}; pid=${pid%/}
                  read -r stat < "/proc/$pid/stat" 2>/dev/null || continue
                  comm=$(echo "$stat" | sed 's/.*(\(.*\)).*/\1/')
                  utime=$(echo "$stat" | awk '{print $14}')
                  stime=$(echo "$stat" | awk '{print $15}')
                  rss=$(awk '/^VmRSS:/{print $2}' "/proc/$pid/status" 2>/dev/null) || continue
                  echo "$TS $pid $comm $utime $stime ${rss:-0}"
                done
                echo "---"
                sleep 2
              done
            ) > "/tmp/proc-cpu-${SUFFIX}.log" 2>&1 &
            echo $! > /tmp/proc-cpu.pid

            (
              while true; do
                TS=$(date +%s)
                BODY=$(curl -sf --max-time 1 http://127.0.0.1:9090/metrics 2>/dev/null || true)
                if [ -n "$BODY" ]; then
                  echo "# ts=$TS"
                  echo "$BODY"
                  echo ""
                fi
                BODY=$(curl -sf --max-time 1 http://127.0.0.1:9092/metrics 2>/dev/null || true)
                if [ -n "$BODY" ]; then
                  echo "# ts=$TS"
                  echo "$BODY"
                  echo ""
                fi
                sleep 2
              done
            ) > "/tmp/metrics-scrape-${SUFFIX}.txt" 2>/dev/null &
            METRICS_SCRAPE_PID=$!

            (cd ci-helpers/k6 && k6 run \
              -e GITHUB_SHA=${{ github.sha }} \
              -e BENCH_PROFILE=8k \
              -e BENCH_CASE="${CASE_NAME}" \
              bench.js)

            kill "$METRICS_SCRAPE_PID" 2>/dev/null || true
            kill "$(cat /tmp/proc-cpu.pid 2>/dev/null)" 2>/dev/null || true
            nproc > "/tmp/nproc-${SUFFIX}"
            echo "$(nproc) $(grep MemTotal /proc/meminfo | awk '{print $2}')" > "/tmp/machine-info-${SUFFIX}"
            python3 "${{ github.workspace }}/ci-helpers/parse-resources.py" \
              --proc-cpu       "/tmp/proc-cpu-${SUFFIX}.log" \
              --metrics-scrape "/tmp/metrics-scrape-${SUFFIX}.txt" \
              --nproc          "/tmp/nproc-${SUFFIX}" \
              --machine-info   "/tmp/machine-info-${SUFFIX}" \
              --output         "/tmp/resource-data-${SUFFIX}.json" \
              || echo "Resource parsing failed (non-fatal)"

            kill -TERM "$(cat /tmp/client.pid 2>/dev/null)" 2>/dev/null || true
            kill -TERM "$(cat /tmp/server.pid 2>/dev/null)" 2>/dev/null || true
            sleep 35
            kill -9 "$(cat /tmp/client.pid 2>/dev/null)" 2>/dev/null || true
            kill -9 "$(cat /tmp/server.pid 2>/dev/null)" 2>/dev/null || true
            echo "=== trace files after shutdown ===" && ls -lh /tmp/server-trace.0.bin /tmp/client-trace.0.bin 2>&1 || true

            mkdir -p "/tmp/trace-${SUFFIX}"
            cp /tmp/bench-results.json "/tmp/trace-${SUFFIX}/bench-results.json"
            if [ "${{ github.event_name == 'workflow_dispatch' && inputs.build_profile == 'release' }}" != "true" ]; then
              if [ ! -s /tmp/server-trace.0.bin ] || [ ! -s /tmp/client-trace.0.bin ]; then
                echo "ERROR: expected dial9 trace segment files not found"
                ls -lh /tmp/server-trace* /tmp/client-trace* 2>&1 || true
                exit 1
              fi
              cp /tmp/server-trace.0.bin "/tmp/trace-${SUFFIX}/server-trace.bin.gz"
              cp /tmp/client-trace.0.bin "/tmp/trace-${SUFFIX}/client-trace.bin.gz"
            fi
            cp "/tmp/proc-cpu-${SUFFIX}.log" "/tmp/trace-${SUFFIX}/proc-cpu.log" 2>/dev/null || true
            cp "/tmp/metrics-scrape-${SUFFIX}.txt" "/tmp/trace-${SUFFIX}/metrics-scrape.txt" 2>/dev/null || true
            cp "/tmp/resource-data-${SUFFIX}.json" "/tmp/trace-${SUFFIX}/resource-data.json" 2>/dev/null || true
            cp "/tmp/ci-server-${SUFFIX}.log" "/tmp/trace-${SUFFIX}/ci-server.log"
            cp "/tmp/ci-client-${SUFFIX}.log" "/tmp/trace-${SUFFIX}/ci-client.log"
            cp "/tmp/ci-ctld-${SUFFIX}.log" "/tmp/trace-${SUFFIX}/ci-ctld.log"
            cp "/tmp/http-echo-${SUFFIX}.log" "/tmp/trace-${SUFFIX}/http-echo.log"
            cp "/tmp/ws-echo-${SUFFIX}.log" "/tmp/trace-${SUFFIX}/ws-echo.log"
            cp "/tmp/grpc-echo-${SUFFIX}.log" "/tmp/trace-${SUFFIX}/grpc-echo.log"
            echo "=== case ${CASE_NAME} done, trace dir: /tmp/trace-${SUFFIX} ===" && ls -lh "/tmp/trace-${SUFFIX}/"

            CTLD_PID="$(cat /tmp/ctld.pid 2>/dev/null || true)"
            [ -n "$CTLD_PID" ] && kill -TERM "$CTLD_PID" 2>/dev/null || true
            sleep 1
            [ -n "$CTLD_PID" ] && kill -9 "$CTLD_PID" 2>/dev/null || true
            kill "$(cat /tmp/http-echo.pid 2>/dev/null)" 2>/dev/null || true
            kill "$(cat /tmp/ws-echo.pid 2>/dev/null)" 2>/dev/null || true
            kill "$(cat /tmp/grpc-echo.pid 2>/dev/null)" 2>/dev/null || true
          }

          run_case ingress_8000qps
          run_case egress_8000qps
          run_case ingress_multihost_8000qps
          run_case egress_multihost_8000qps

          # Merge all 4 per-case bench-results.json into one combined file
          python3 - << 'PY'
          import json, os
          from copy import deepcopy

          cases = ["ingress_8000qps", "egress_8000qps", "ingress_multihost_8000qps", "egress_multihost_8000qps"]
          merged = None
          sc_by_name = {}
          for case in cases:
              p = f"/tmp/trace-{case}/bench-results.json"
              if not os.path.isfile(p):
                  continue
              with open(p) as f:
                  data = json.load(f)
              if merged is None:
                  merged = deepcopy(data)
                  merged["scenarios"] = []
                  merged["phases"] = []
                  sc_by_name = {}
              cur_max = max((float(ph.get("end", 0)) for ph in merged.get("phases", []) if isinstance(ph, dict)), default=0)
              offset = cur_max + 5 if cur_max > 0 else 0
              for s in data.get("scenarios", []):
                  if isinstance(s, dict) and s.get("name"):
                      sc_by_name[s["name"]] = s
              for ph in data.get("phases", []):
                  if not isinstance(ph, dict):
                      continue
                  np = deepcopy(ph)
                  np["start"] = round(float(np.get("start", 0)) + offset, 2)
                  np["end"] = round(float(np.get("end", 0)) + offset, 2)
                  merged["phases"].append(np)
          if merged:
              merged["scenarios"] = list(sc_by_name.values())
              total_req = sum(float(s.get("requests", 0) or 0) for s in merged["scenarios"])
              total_err = sum(float(s.get("requests", 0) or 0) * float(s.get("err", 0) or 0) / 100.0 for s in merged["scenarios"])
              total_rps = sum(float(s.get("rps", 0) or 0) for s in merged["scenarios"] if s.get("includeInTotalRps"))
              merged["summary"] = {
                  "totalRPS": round(total_rps, 2),
                  "totalErr": round(0.0 if total_req <= 0 else total_err / total_req * 100.0, 2),
                  "totalRequests": int(round(total_req)),
              }
              with open("/tmp/bench-results-8k-combined.json", "w") as f:
                  json.dump(merged, f, indent=2)
              print("Combined bench-results written.")
          else:
              print("WARNING: no bench-results found for any 8k case")
          PY

      - name: Upload benchmark outputs (8k)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stress-profile-8k-results-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: warn
          path: |
            /tmp/bench-results-8k-combined.json

      - name: Upload dial9 trace (8k ingress server)
        id: upload-trace-ingress-8000qps-server
        if: always() && (github.event_name != 'workflow_dispatch' || inputs.build_profile == 'dial9' || inputs.build_profile == 'both')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dial9-trace-8k-ingress_8000qps-server-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: /tmp/trace-ingress_8000qps/server-trace.bin.gz

      - name: Upload dial9 trace (8k ingress client)
        id: upload-trace-ingress-8000qps-client
        if: always() && (github.event_name != 'workflow_dispatch' || inputs.build_profile == 'dial9' || inputs.build_profile == 'both')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dial9-trace-8k-ingress_8000qps-client-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: /tmp/trace-ingress_8000qps/client-trace.bin.gz

      - name: Upload dial9 trace (8k egress server)
        id: upload-trace-egress-8000qps-server
        if: always() && (github.event_name != 'workflow_dispatch' || inputs.build_profile == 'dial9' || inputs.build_profile == 'both')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dial9-trace-8k-egress_8000qps-server-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: /tmp/trace-egress_8000qps/server-trace.bin.gz

      - name: Upload dial9 trace (8k egress client)
        id: upload-trace-egress-8000qps-client
        if: always() && (github.event_name != 'workflow_dispatch' || inputs.build_profile == 'dial9' || inputs.build_profile == 'both')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dial9-trace-8k-egress_8000qps-client-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: /tmp/trace-egress_8000qps/client-trace.bin.gz

      - name: Upload dial9 trace (8k ingress multihost server)
        id: upload-trace-ingress-multihost-8000qps-server
        if: always() && (github.event_name != 'workflow_dispatch' || inputs.build_profile == 'dial9' || inputs.build_profile == 'both')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dial9-trace-8k-ingress_multihost_8000qps-server-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: /tmp/trace-ingress_multihost_8000qps/server-trace.bin.gz

      - name: Upload dial9 trace (8k ingress multihost client)
        id: upload-trace-ingress-multihost-8000qps-client
        if: always() && (github.event_name != 'workflow_dispatch' || inputs.build_profile == 'dial9' || inputs.build_profile == 'both')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dial9-trace-8k-ingress_multihost_8000qps-client-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: /tmp/trace-ingress_multihost_8000qps/client-trace.bin.gz

      - name: Upload dial9 trace (8k egress multihost server)
        id: upload-trace-egress-multihost-8000qps-server
        if: always() && (github.event_name != 'workflow_dispatch' || inputs.build_profile == 'dial9' || inputs.build_profile == 'both')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dial9-trace-8k-egress_multihost_8000qps-server-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: /tmp/trace-egress_multihost_8000qps/server-trace.bin.gz

      - name: Upload dial9 trace (8k egress multihost client)
        id: upload-trace-egress-multihost-8000qps-client
        if: always() && (github.event_name != 'workflow_dispatch' || inputs.build_profile == 'dial9' || inputs.build_profile == 'both')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dial9-trace-8k-egress_multihost_8000qps-client-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: /tmp/trace-egress_multihost_8000qps/client-trace.bin.gz


      - name: Upload resource data (ingress 8k — contains prom_metrics)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stress-trace-8k-resource-data-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: /tmp/trace-ingress_8000qps/resource-data.json

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stress-trace-8k-logs-${{ github.run_id }}
          retention-days: 7
          path: |
            /tmp/trace-ingress_8000qps/
            /tmp/trace-egress_8000qps/
            /tmp/trace-ingress_multihost_8000qps/
            /tmp/trace-egress_multihost_8000qps/

      - name: Cleanup
        if: always()
        run: |
          kill "$(cat /tmp/ctld.pid      2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/server.pid    2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/client.pid    2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/http-echo.pid 2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/ws-echo.pid   2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/grpc-echo.pid 2>/dev/null)" 2>/dev/null || true

  publish-bench:
    name: Publish Benchmark (merged)
    if: |
      always() &&
      (needs.stress-test.result == 'success' || needs.stress-test.result == 'skipped') &&
      (needs.stress-trace-8k.result == 'success' || needs.stress-trace-8k.result == 'skipped') &&
      (needs.stress-test.result == 'success' || needs.stress-trace-8k.result == 'success') &&
      (github.ref == 'refs/heads/main' || inputs.publish_pages == true)
    runs-on: ubuntu-latest
    needs: [stress-test, stress-trace-8k]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download core benchmark outputs
        uses: actions/download-artifact@v4
        with:
          name: stress-core-results-${{ github.run_id }}
          path: /tmp/core

      - name: Download 8k benchmark outputs
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: stress-profile-8k-results-${{ github.run_id }}
          path: /tmp/profile8k

      - name: Download 8k resource data (prom_metrics)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: stress-trace-8k-resource-data-${{ github.run_id }}
          path: /tmp/trace8k-resource

      - name: Download dial9 trace (8k ingress server)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dial9-trace-8k-ingress_8000qps-server-${{ github.run_id }}
          path: /tmp/dial9-traces-q4/trace-ingress_8000qps

      - name: Download dial9 trace (8k ingress client)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dial9-trace-8k-ingress_8000qps-client-${{ github.run_id }}
          path: /tmp/dial9-traces-q4/trace-ingress_8000qps

      - name: Download dial9 trace (8k egress server)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dial9-trace-8k-egress_8000qps-server-${{ github.run_id }}
          path: /tmp/dial9-traces-q4/trace-egress_8000qps

      - name: Download dial9 trace (8k egress client)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dial9-trace-8k-egress_8000qps-client-${{ github.run_id }}
          path: /tmp/dial9-traces-q4/trace-egress_8000qps

      - name: Download dial9 trace (8k ingress multihost server)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dial9-trace-8k-ingress_multihost_8000qps-server-${{ github.run_id }}
          path: /tmp/dial9-traces-q4/trace-ingress_multihost_8000qps

      - name: Download dial9 trace (8k ingress multihost client)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dial9-trace-8k-ingress_multihost_8000qps-client-${{ github.run_id }}
          path: /tmp/dial9-traces-q4/trace-ingress_multihost_8000qps

      - name: Download dial9 trace (8k egress multihost server)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dial9-trace-8k-egress_multihost_8000qps-server-${{ github.run_id }}
          path: /tmp/dial9-traces-q4/trace-egress_multihost_8000qps

      - name: Download dial9 trace (8k egress multihost client)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dial9-trace-8k-egress_multihost_8000qps-client-${{ github.run_id }}
          path: /tmp/dial9-traces-q4/trace-egress_multihost_8000qps

      - name: Merge benchmark outputs
        run: |
          if [ ! -s /tmp/core/bench-results.json ]; then
            echo "ERROR: missing core benchmark output"
            exit 1
          fi
          python3 - << 'PY'
          import json
          from copy import deepcopy

          import os

          core_path = "/tmp/core/bench-results.json"
          extra_q4_path = "/tmp/profile8k/bench-results-8k-combined.json" if os.path.isfile("/tmp/profile8k/bench-results-8k-combined.json") else None
          out_path = "/tmp/bench-results-merged.json"

          def r2(v):
              return round(float(v), 2)

          with open(core_path, "r", encoding="utf-8") as f:
              core = json.load(f)

          merged = deepcopy(core)

          if merged.get("scenarios") is None:
              merged["scenarios"] = []
          if merged.get("phases") is None:
              merged["phases"] = []

          sc_by_name = {}
          for s in merged["scenarios"]:
              if isinstance(s, dict) and "name" in s:
                  sc_by_name[s["name"]] = s

          def merge_extra(extra_path, label, include_in_total_rps):
              if not extra_path:
                  return
              with open(extra_path, "r", encoding="utf-8") as f:
                  extra = json.load(f)
              if not extra:
                  return

              name_map = {}
              for s in extra.get("scenarios", []):
                  if not isinstance(s, dict):
                      continue
                  ns = deepcopy(s)
                  old_name = str(ns.get("name", "") or "")
                  if old_name:
                      new_name = f"{old_name} ({label})"
                      name_map[old_name] = new_name
                      ns["name"] = new_name
                  if not include_in_total_rps:
                      ns["includeInTotalRps"] = False
                  if "name" in ns:
                      sc_by_name[ns["name"]] = ns

              core_max_end = 0
              for p in merged.get("phases", []):
                  if isinstance(p, dict):
                      core_max_end = max(core_max_end, float(p.get("end", 0) or 0))
              phase_offset = core_max_end + 5

              for p in extra.get("phases", []):
                  if not isinstance(p, dict):
                      continue
                  np = deepcopy(p)
                  np["start"] = r2(float(np.get("start", 0) or 0) + phase_offset)
                  np["end"] = r2(float(np.get("end", 0) or 0) + phase_offset)
                  phase_name = str(np.get("name", ""))
                  np["name"] = f"{phase_name} ({label})" if phase_name else label
                  if isinstance(np.get("scenarios"), list):
                      np["scenarios"] = [name_map.get(n, n) for n in np.get("scenarios", [])]
                  merged["phases"].append(np)

              core_catalog = merged.get("catalog") or {}
              extra_catalog = extra.get("catalog") or {}
              core_case_order = list(core_catalog.get("caseOrder") or [])
              for n in extra_catalog.get("caseOrder") or []:
                  nn = name_map.get(n, n)
                  if nn not in core_case_order:
                      core_case_order.append(nn)
              core_catalog["caseOrder"] = core_case_order

              categories = []
              seen_cat = set()
              for c in (core_catalog.get("categories") or []) + (extra_catalog.get("categories") or []):
                  if not isinstance(c, dict):
                      continue
                  cid = c.get("id")
                  if cid in seen_cat:
                      continue
                  seen_cat.add(cid)
                  categories.append(c)
              core_catalog["categories"] = categories
              merged["catalog"] = core_catalog

          merge_extra(extra_q4_path, "8k-q4", True)

          merged["scenarios"] = list(sc_by_name.values())

          total_requests = 0.0
          total_errors = 0.0
          total_rps = 0.0
          for s in merged["scenarios"]:
              req = float(s.get("requests", 0) or 0)
              err = float(s.get("err", 0) or 0)
              rps = float(s.get("rps", 0) or 0)
              total_requests += req
              total_errors += req * err / 100.0
              if bool(s.get("includeInTotalRps", False)):
                  total_rps += rps

          total_err = 0.0 if total_requests <= 0 else (total_errors / total_requests * 100.0)
          merged["summary"] = {
              "totalRPS": r2(total_rps),
              "totalErr": r2(total_err),
              "totalRequests": int(round(total_requests)),
          }

          with open(out_path, "w", encoding="utf-8") as f:
              json.dump(merged, f, ensure_ascii=False, indent=2)
          PY

      - name: Publish benchmark to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp
          GH_REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          if git clone --branch gh-pages --single-branch --depth 1 --filter=blob:none --no-checkout "$GH_REPO_URL" gh-pages-repo 2>/dev/null; then
            cd gh-pages-repo
            git sparse-checkout init --cone
            git sparse-checkout set bench
            git checkout
          else
            mkdir gh-pages-repo && cd gh-pages-repo && git init && git checkout --orphan gh-pages
          fi
          mkdir -p bench
          cp "${{ github.workspace }}/bench/index.html" bench/index.html
          rm -rf bench/viewer && cp -r "${{ github.workspace }}/bench/viewer" bench/viewer
          # Keep only the 3 most recent trace sets, delete older shards
          # Each trace set is a directory named <sha>-<case>-<role>
          if [ -d bench/traces ]; then
            find bench/traces -name "*.html" -delete 2>/dev/null || true
            SHAS=$(ls -1d bench/traces/*/ 2>/dev/null | sed 's|bench/traces/||;s|-.*||' | sort -u)
            SHA_COUNT=$(echo "$SHAS" | grep -c . || true)
            if [ "$SHA_COUNT" -gt 3 ]; then
              OLD_SHAS=$(echo "$SHAS" | head -n $(( SHA_COUNT - 3 )))
              for OLD in $OLD_SHAS; do
                find bench/traces -maxdepth 1 -name "${OLD}-*" | xargs rm -rf
              done
            fi
          fi
          FRP_ARG=""
          FRP_OFFSET_ARG=""
          if [ -s /tmp/core/bench-results-frp.json ]; then
            FRP_ARG="--frp-result /tmp/core/bench-results-frp.json"
            if [ -f /tmp/core/frp_k6_start_epoch ] && [ -f /tmp/core/sampling_start_epoch ]; then
              FRP_K6_OFFSET=$(( $(cat /tmp/core/frp_k6_start_epoch) - $(cat /tmp/core/sampling_start_epoch) ))
              FRP_OFFSET_ARG="--frp-k6-offset $FRP_K6_OFFSET"
            fi
          fi
          RES_ARG=""
          if [ -s /tmp/trace8k-resource/resource-data.json ]; then
            RES_ARG="--resources /tmp/trace8k-resource/resource-data.json"
          elif [ -s /tmp/core/resource-data.json ]; then
            RES_ARG="--resources /tmp/core/resource-data.json"
          fi
          TRACE_ARTIFACT_INGRESS_8000QPS_SERVER_URL="${{ needs.stress-trace-8k.outputs.trace_artifact_ingress_8000qps_server_url }}"
          TRACE_ARTIFACT_INGRESS_8000QPS_CLIENT_URL="${{ needs.stress-trace-8k.outputs.trace_artifact_ingress_8000qps_client_url }}"
          TRACE_ARTIFACT_EGRESS_8000QPS_SERVER_URL="${{ needs.stress-trace-8k.outputs.trace_artifact_egress_8000qps_server_url }}"
          TRACE_ARTIFACT_EGRESS_8000QPS_CLIENT_URL="${{ needs.stress-trace-8k.outputs.trace_artifact_egress_8000qps_client_url }}"
          TRACE_ARTIFACT_INGRESS_MULTIHOST_8000QPS_SERVER_URL="${{ needs.stress-trace-8k.outputs.trace_artifact_ingress_multihost_8000qps_server_url }}"
          TRACE_ARTIFACT_INGRESS_MULTIHOST_8000QPS_CLIENT_URL="${{ needs.stress-trace-8k.outputs.trace_artifact_ingress_multihost_8000qps_client_url }}"
          TRACE_ARTIFACT_EGRESS_MULTIHOST_8000QPS_SERVER_URL="${{ needs.stress-trace-8k.outputs.trace_artifact_egress_multihost_8000qps_server_url }}"
          TRACE_ARTIFACT_EGRESS_MULTIHOST_8000QPS_CLIENT_URL="${{ needs.stress-trace-8k.outputs.trace_artifact_egress_multihost_8000qps_client_url }}"
          SHORT_SHA="$(echo '${{ github.sha }}' | cut -c1-7)"
          REPO_NAME="$(echo '${{ github.repository }}' | cut -d/ -f2)"
          BASE_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}/bench/traces"
          mkdir -p bench/traces
          # For each per-case trace: decode to 3 JSON shards (meta + events.gz + cpu.gz).
          # Shards are ~1-15 MB each — no single file near the 100 MB push limit.
          # The viewer fetches shards via ?trace=<base-url> and parses them in the browser.
          TRACE_CASES_JSON='['
          FIRST=1
          for CASE_NAME in ingress_8000qps egress_8000qps ingress_multihost_8000qps egress_multihost_8000qps; do
            SRV="/tmp/dial9-traces-q4/trace-${CASE_NAME}/server-trace.bin.gz"
            CLI="/tmp/dial9-traces-q4/trace-${CASE_NAME}/client-trace.bin.gz"
            SRV_URL=""
            CLI_URL=""
            SRV_ARTIFACT_URL=""
            CLI_ARTIFACT_URL=""
            case "$CASE_NAME" in
              ingress_8000qps)
                SRV_ARTIFACT_URL="$TRACE_ARTIFACT_INGRESS_8000QPS_SERVER_URL"
                CLI_ARTIFACT_URL="$TRACE_ARTIFACT_INGRESS_8000QPS_CLIENT_URL"
                ;;
              egress_8000qps)
                SRV_ARTIFACT_URL="$TRACE_ARTIFACT_EGRESS_8000QPS_SERVER_URL"
                CLI_ARTIFACT_URL="$TRACE_ARTIFACT_EGRESS_8000QPS_CLIENT_URL"
                ;;
              ingress_multihost_8000qps)
                SRV_ARTIFACT_URL="$TRACE_ARTIFACT_INGRESS_MULTIHOST_8000QPS_SERVER_URL"
                CLI_ARTIFACT_URL="$TRACE_ARTIFACT_INGRESS_MULTIHOST_8000QPS_CLIENT_URL"
                ;;
              egress_multihost_8000qps)
                SRV_ARTIFACT_URL="$TRACE_ARTIFACT_EGRESS_MULTIHOST_8000QPS_SERVER_URL"
                CLI_ARTIFACT_URL="$TRACE_ARTIFACT_EGRESS_MULTIHOST_8000QPS_CLIENT_URL"
                ;;
            esac
            if [ -s "$SRV" ]; then
              node "${{ github.workspace }}/bench/viewer/bin2json.js" \
                "$SRV" "bench/traces/${SHORT_SHA}-${CASE_NAME}-server"
              SRV_URL="${BASE_URL}/${SHORT_SHA}-${CASE_NAME}-server"
            fi
            if [ -s "$CLI" ]; then
              node "${{ github.workspace }}/bench/viewer/bin2json.js" \
                "$CLI" "bench/traces/${SHORT_SHA}-${CASE_NAME}-client"
              CLI_URL="${BASE_URL}/${SHORT_SHA}-${CASE_NAME}-client"
            fi
            if [ -n "$SRV_URL" ] || [ -n "$CLI_URL" ] || [ -n "$SRV_ARTIFACT_URL" ] || [ -n "$CLI_ARTIFACT_URL" ]; then
              [ "$FIRST" = "1" ] && FIRST=0 || TRACE_CASES_JSON="${TRACE_CASES_JSON},"
              TRACE_CASES_JSON="${TRACE_CASES_JSON}{\"case\":\"${CASE_NAME}\",\"server\":\"${SRV_URL}\",\"client\":\"${CLI_URL}\",\"server_download\":\"${SRV_ARTIFACT_URL}\",\"client_download\":\"${CLI_ARTIFACT_URL}\"}"
            fi
          done
          TRACE_CASES_JSON="${TRACE_CASES_JSON}]"
          TRACE_CASES_ARG=""
          if [ "$TRACE_CASES_JSON" != "[]" ]; then
            echo "$TRACE_CASES_JSON" > /tmp/trace-cases.json
            TRACE_CASES_ARG="--trace-cases-file /tmp/trace-cases.json"
          fi
          echo "Trace shards in bench/traces/:" && ls -lh bench/traces/ || true
          python3 "${{ github.workspace }}/ci-helpers/publish-bench.py" \
            --result  /tmp/bench-results-merged.json \
            --data    bench/data.js \
            --sha     "${{ github.sha }}" \
            --msg     "$(git -C "${{ github.workspace }}" log -1 --pretty=%s)" \
            --url     "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            $RES_ARG $FRP_ARG $FRP_OFFSET_ARG \
            $TRACE_CASES_ARG
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bench/
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "bench: update data for $(echo '${{ github.sha }}' | cut -c1-7)"
          git push --force origin gh-pages
